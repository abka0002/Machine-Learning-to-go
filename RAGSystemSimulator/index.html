// ───────────────────── 2. THE PROBLEM ─────────────────────
{id: 'problem', title: 'The Problem', group: 'Setup',
render() {
  let h = `<div class="stage-title">The Problem: Closed-Book LLMs <span class="tag trd">PROBLEM</span></div>`;
  h += `<p class="stage-desc">A standard LLM is a <strong>closed-book</strong> system: once training ends, all the knowledge it will ever have is compressed into its weights. This creates four hard problems that RAG directly addresses.</p>`;

  h += `<div class="info ird"><div class="il">1 · Knowledge cutoff</div>
The model only knows what was in its training data. A GPT-4 variant trained on data up to April 2024 cannot tell you about events in 2025 — not because it's being cagey, but because those events are not encoded in its weights. Any answer it gives will be extrapolation or confabulation.</div>`;

  h += `<div class="info ird"><div class="il">2 · Hallucination</div>
When asked about obscure facts, LLMs often produce confident-sounding but entirely fabricated answers. The model optimizes for "plausible next token" and has no internal signal for "I don't actually know this." RAG grounds the output in real sources so the model can either cite a fact or honestly say it wasn't found.</div>`;

  h += `<div class="info ird"><div class="il">3 · No traceability</div>
A closed-book answer is unauditable. You can't ask the model "where did you learn that?" and get a meaningful answer — the knowledge is diffused across billions of weights. For medical, legal, financial, and scientific applications, this is a dealbreaker.</div>`;

  h += `<div class="info ird"><div class="il">4 · Can't update cheaply</div>
Adding new knowledge means fine-tuning or re-training — expensive, slow, and error-prone. With RAG, updating the knowledge base is as simple as adding a new document to the vector database. The LLM itself never changes.</div>`;

  // Example hallucination
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">A concrete example</h3>`;
  h += `<div class="answer-grid">
<div class="answer-card bad">
<div class="lbl">Closed-book LLM</div>
<div class="txt"><em>Q: "What were Anthropic's Q4 2025 earnings?"</em><br><br>A: "In Q4 2025, Anthropic reported revenue of approximately $420 million, with year-over-year growth of 380%..."<br><br><strong style="color:var(--red);">⚠ Made up.</strong> Plausible-looking but entirely fabricated numbers.</div>
</div>
<div class="answer-card good">
<div class="lbl">RAG</div>
<div class="txt"><em>Q: "What were Anthropic's Q4 2025 earnings?"</em><br><br>A: "Based on the retrieved press release: Anthropic reported Q4 2025 revenue of $X million [source: press_release_2026_01]."<br><br><strong style="color:var(--acc);">✓ Grounded.</strong> Either answers with a real quote or says nothing was found.</div>
</div>
</div>`;

  return h;
}},

// ───────────────────── 3. CHUNKING ─────────────────────
{id: 'chunking', title: 'Chunking', group: 'Indexing',
render() {
  let h = `<div class="stage-title">Step 1 · Document Chunking <span class="tag tr">INDEX</span></div>`;
  h += `<p class="stage-desc">Before retrieval can happen, the source corpus (PDFs, web pages, documentation, books, emails…) must be split into small <strong>chunks</strong>. Each chunk becomes one row in the vector database. The chunking strategy matters enormously — it determines what the retriever can actually find.</p>`;

  h += `<div class="info ir"><div class="il">Why not just embed whole documents?</div>
Two reasons. First, embedding models have a <strong>context limit</strong> (usually 512–8192 tokens) — you physically cannot feed them a whole PDF. Second, a single vector can only represent one "gist," so embedding a 50-page manual produces a fuzzy average that matches everything and nothing. Chunking gives you many focused vectors, each representing a specific topic.</div>`;

  h += `<h3 style="margin-top:1rem;font-size:0.95rem;color:var(--txt);">Common chunking strategies</h3>`;
  h += `<div class="glossary"><table>
<tr><th>Strategy</th><th>How it works</th><th>When to use</th></tr>
<tr><td class="sym">Fixed-size</td><td class="def">Split into N-token blocks (e.g., 512 tokens) regardless of structure.</td><td class="def">Simple baseline. Cheap but cuts sentences in half.</td></tr>
<tr><td class="sym">Sliding window</td><td class="def">Fixed-size blocks with a 10–20% <strong>overlap</strong> between consecutive chunks.</td><td class="def">Default choice for most systems. Overlap ensures facts that straddle a boundary still appear in at least one chunk.</td></tr>
<tr><td class="sym">Sentence-based</td><td class="def">Split on sentence boundaries, group sentences until a token budget is reached.</td><td class="def">Cleaner boundaries; works well for prose.</td></tr>
<tr><td class="sym">Structure-aware</td><td class="def">Split on Markdown headings, code blocks, HTML tags, PDF sections.</td><td class="def">Best for technical documentation, where headings carry meaning.</td></tr>
<tr><td class="sym">Semantic</td><td class="def">Use an embedding model to detect topic shifts and split there.</td><td class="def">Highest quality but computationally expensive.</td></tr>
</table></div>`;

  h += `<div class="info ig"><div class="il">The chunk-size trade-off</div>
<strong>Small chunks (~100 tokens):</strong> precise retrieval, but each chunk lacks context — the LLM may not have enough surrounding information to answer.<br>
<strong>Large chunks (~2000 tokens):</strong> lots of context per chunk, but retrieval is less precise (the relevant sentence is buried among irrelevant ones) and you can fit fewer chunks in the LLM's context window.<br>
<strong>Sweet spot:</strong> most systems use <strong>200–500 token chunks with 10–20% overlap</strong>. Tune empirically for your corpus and queries.</div>`;

  // ── Interactive chunking slider ──
  h += `<h3 style="margin-top:1.5rem;font-size:0.95rem;color:var(--txt);">🎛️ Try it yourself · sliding-window chunker</h3>`;
  h += `<p class="stage-desc">Below is a sample paragraph about LoRA. Drag the <strong>chunk size</strong> and <strong>overlap</strong> sliders to see how the same text gets split differently. Watch what happens when chunks are very small (too many fragments, no context) vs. very large (just one or two mega-chunks) vs. what happens with zero overlap (facts at the boundary can get cut in half).</p>`;
  h += `<div class="inline-slider">
<div class="ctrl"><label>chunk size</label><input type="range" min="30" max="200" step="5" value="${CHUNK_SIZE}" oninput="onChunkSizeChange(this.value)"><span class="val" id="chunk-size-val">${CHUNK_SIZE}</span><span style="font-size:0.66rem;color:var(--txt3);font-family:var(--mono);">chars</span></div>
<div class="ctrl"><label>overlap</label><input type="range" min="0" max="50" step="2" value="${CHUNK_OVERLAP}" oninput="onChunkOverlapChange(this.value)"><span class="val" id="chunk-overlap-val">${CHUNK_OVERLAP}</span><span style="font-size:0.66rem;color:var(--txt3);font-family:var(--mono);">chars</span></div>
</div>`;
  h += renderChunkingDemo(CHUNK_SIZE, CHUNK_OVERLAP);
  h += `<div class="info is"><div class="il">Things to try</div>
<strong>• Chunk size = 30, overlap = 0</strong>: see how the text shatters into tiny fragments that each carry almost no meaning.<br>
<strong>• Chunk size = 200, overlap = 0</strong>: one or two huge chunks — if the query asks about "low-rank decomposition" which appears mid-chunk, the whole chunk's embedding is dominated by other topics.<br>
<strong>• Chunk size = 80, overlap = 20</strong>: reasonable balance. Notice how the overlap region repeats across consecutive chunks — this ensures facts straddling a boundary still appear intact in at least one chunk.</div>`;

  // Show the corpus we'll use
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">Our demo corpus</h3>`;
  h += `<p class="stage-desc">For this simulator we use a tiny corpus of ${CORPUS.length} hand-crafted chunks covering four topics: LoRA fine-tuning, the Transformer paper, French geography, and vector similarity. In a real RAG system this corpus would be thousands to millions of chunks.</p>`;
  h += `<div class="doc-list">`;
  CORPUS.forEach(d => h += renderDoc(d));
  h += `</div>`;

  return h;
}},

// ───────────────────── 4. EMBEDDING ─────────────────────
{id: 'embedding', title: 'Embedding', group: 'Indexing',
render() {
  let h = `<div class="stage-title">Step 2 · Embedding the Corpus <span class="tag tp">EMBED</span></div>`;
  h += `<p class="stage-desc">Each chunk is passed through an <strong>embedding model</strong> that produces a fixed-length dense vector. Semantically similar chunks land near each other in this vector space. The embedding model is trained so that <em>"dog"</em> and <em>"puppy"</em> end up close together, while <em>"dog"</em> and <em>"spreadsheet"</em> end up far apart.</p>`;

  h += `<div class="formula">vec(chunk) = <span class="hl">embed_model</span>( chunk_text )&nbsp;&nbsp;&nbsp;<span class="cm">// → ℝ^d, then L2-normalized</span></div>`;

  h += `<div class="info ip"><div class="il">Popular embedding models</div>
<table style="font-family:var(--mono);font-size:0.75rem;width:100%;">
<tr><td><strong>all-MiniLM-L6-v2</strong></td><td>384 dims</td><td style="color:var(--txt3);">Sentence-Transformers default. Fast, small, decent quality.</td></tr>
<tr><td><strong>bge-base-en-v1.5</strong></td><td>768 dims</td><td style="color:var(--txt3);">BAAI. Strong MTEB benchmark scores.</td></tr>
<tr><td><strong>text-embedding-3-small</strong></td><td>1536 dims</td><td style="color:var(--txt3);">OpenAI. Paid API, high quality.</td></tr>
<tr><td><strong>text-embedding-3-large</strong></td><td>3072 dims</td><td style="color:var(--txt3);">OpenAI. Highest quality in the OpenAI line.</td></tr>
<tr><td><strong>voyage-3</strong></td><td>1024 dims</td><td style="color:var(--txt3);">Voyage AI. Leads several MTEB categories.</td></tr>
</table></div>`;

  // Show the first few chunks and their embeddings
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">Corpus embeddings (after normalization)</h3>`;
  h += `<p class="stage-desc">Each row is one chunk's embedding in our 8-dimensional toy space. Notice how related chunks have visually similar patterns — docs 1–3 (LoRA) look alike, docs 4–6 (Transformers) cluster separately, and so on.</p>`;

  h += `<div class="mtx-wrap"><table class="mtx" style="margin:0 auto;">`;
  h += `<tr><td class="cheader">id</td><td class="cheader">topic</td>`;
  for (let i = 0; i < 8; i++) h += `<td class="cheader">d${i}</td>`;
  h += `</tr>`;
  const topics = ['LoRA', 'LoRA', 'LoRA', 'Transformers', 'Transformers', 'Transformers', 'Geography', 'Geography', 'Similarity', 'Similarity'];
  CORPUS.forEach((d, i) => {
    h += `<tr><td class="cheader">${d.id}</td><td class="cheader" style="text-align:left;padding-left:0.5rem;">${topics[i]}</td>`;
    d.vec.forEach(v => h += `<td class="cp">${fmt(v)}</td>`);
    h += `</tr>`;
  });
  h += `</table></div>`;

  h += `<div class="info is"><div class="il">Why L2-normalize?</div>
After embedding, we scale every vector to unit length (<code>||v|| = 1</code>). This serves two purposes: (1) it makes cosine similarity reduce to a simple dot product, which is much faster to compute; (2) it ensures retrieval ranks chunks by <em>direction</em>, not <em>length</em> — two chunks about the same topic should score the same regardless of how "loud" the embedding model made them.</div>`;

  h += `<div class="info iac"><div class="il">Key property: isometry of meaning</div>
A good embedding model makes <strong>semantic distance ≈ geometric distance</strong>. Paraphrases of the same idea become close vectors even if they share no words. This is what lets the retriever find <em>"Who authored the Transformer paper?"</em> when the corpus only contains <em>"Vaswani et al. introduced self-attention..."</em>.</div>`;

  // ── Interactive 2D visualization ──
  h += `<h3 style="margin-top:1.5rem;font-size:0.95rem;color:var(--txt);">📊 The vector space, visualized</h3>`;
  h += `<p class="stage-desc">We can't draw 8 dimensions directly, but we can project them onto two axes for visualization. In real systems this is typically done with <strong>PCA</strong>, <strong>t-SNE</strong>, or <strong>UMAP</strong>; for this small toy corpus we use a simpler hand-picked projection that places each topic cluster at its own compass point (LoRA → right, Transformers → left, Geography → top, Similarity → bottom). The purple <strong>QUERY</strong> marker shows where the current query from the header dropdown lands — try switching queries to see it jump between clusters.</p>`;
  h += `<div class="scatter-wrap">${renderScatter2D({showSimLines: false, showLabels: true})}</div>`;
  h += `<div class="scatter-caption">↑ 2D projection of the 8-dim embeddings · change the query in the header to see the purple marker move</div>`;

  h += `<div class="info is"><div class="il">What this tells us</div>
Notice that the four topic clusters form <strong>clearly separated regions</strong>, even after squashing 8 dimensions down to 2. This is the property that makes retrieval work: <em>semantically related content lives near itself in vector space</em>. When a query arrives, finding the "most similar" documents is literally the same as finding the <em>geometrically closest</em> points.</div>`;

  return h;
}},

// ───────────────────── 5. VECTOR DB ─────────────────────
{id: 'vectordb', title: 'Vector Database', group: 'Indexing',
render() {
  let h = `<div class="stage-title">Step 3 · The Vector Database <span class="tag tr">INDEX</span></div>`;
  h += `<p class="stage-desc">The embedded chunks are loaded into a <strong>vector database</strong> — a data store optimized for fast nearest-neighbor search over high-dimensional vectors. When a query arrives, the database finds the top-k closest vectors in milliseconds, even if there are millions of them.</p>`;

  h += `<div class="info ir"><div class="il">What the database actually stores</div>
For each chunk, the database stores:<br>
• The <strong>embedding vector</strong> (used for similarity search)<br>
• The <strong>original text</strong> (used later by the LLM)<br>
• Optional <strong>metadata</strong>: document source, page number, timestamp, tags (used for filtering)<br><br>
The embedding is the index, the text is the payload.</div>`;

  h += `<h3 style="margin-top:1rem;font-size:0.95rem;color:var(--txt);">Brute-force vs. approximate search</h3>`;
  h += `<div class="glossary"><table>
<tr><th>Approach</th><th>Complexity</th><th>When to use</th></tr>
<tr><td class="sym">Exact (brute-force)</td><td class="def">O(N·d) per query — compare against every vector.</td><td class="def">Corpus &lt; ~100k chunks. Guarantees the true top-k.</td></tr>
<tr><td class="sym">IVF (inverted file)</td><td class="def">Cluster vectors, search only nearby clusters.</td><td class="def">Mid-size corpora. Trades some recall for speed.</td></tr>
<tr><td class="sym" style="color:var(--rust);">HNSW</td><td class="def">Hierarchical Navigable Small World graph [5]. Logarithmic search via graph navigation.</td><td class="def">The modern default. Used by Pinecone, Weaviate, Qdrant, Milvus, pgvector.</td></tr>
<tr><td class="sym">PQ (product quantization)</td><td class="def">Compress vectors to 8–16× smaller footprint.</td><td class="def">Billion-scale corpora where RAM is the bottleneck.</td></tr>
</table></div>`;

  h += `<div class="info is"><div class="il">Popular vector databases</div>
<strong>FAISS</strong> (Meta, library) [4] · <strong>Pinecone</strong> (managed SaaS) · <strong>Weaviate</strong> (open-source, GraphQL) · <strong>Qdrant</strong> (open-source, Rust) · <strong>Milvus</strong> (open-source, Go) · <strong>Chroma</strong> (open-source, Python-first) · <strong>pgvector</strong> (PostgreSQL extension) · <strong>Elasticsearch / OpenSearch</strong> (with dense-vector fields). All of them speak roughly the same interface: insert vectors, query by vector, filter by metadata.</div>`;

  // Show all embeddings as the "database"
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">Our demo database</h3>`;
  h += `<p class="stage-desc">All ${CORPUS.length} chunks have been indexed. When a query comes in, we'll compute cosine similarity against every chunk and sort by score. With only 10 vectors, brute-force is instant.</p>`;

  h += `<div class="doc-list">`;
  CORPUS.forEach(d => h += renderDoc(d));
  h += `</div>`;

  return h;
}},

// ───────────────────── 6. QUERY EMBED ─────────────────────
{id: 'query-embed', title: 'Query Embedding', group: 'Retrieval',
render() {
  const {query} = computeRetrieval();
  let h = `<div class="stage-title">Step 4 · Embed the Query <span class="tag tp">QUERY</span></div>`;
  h += `<p class="stage-desc">When a user asks a question, the first thing we do is <strong>embed it using exactly the same model</strong> that embedded the corpus. This puts the query in the same vector space as the chunks, so cosine similarity becomes meaningful.</p>`;

  h += `<div class="formula">q_vec = <span class="hl">embed_model</span>( query_text )&nbsp;&nbsp;&nbsp;<span class="cm">// same model as the corpus!</span></div>`;

  h += `<div class="info ip"><div class="il">Current query</div>
<strong>"${query.text}"</strong><br>
<span style="font-size:0.78rem;color:var(--txt3);">Topic cluster: ${query.topic}</span></div>`;

  h += `<div class="mtx-wrap"><div class="mtx-row">`;
  h += renderVec(query.vec, `q_vec (8 dims, normalized)`, 'cp');
  h += `</div></div>`;

  h += `<div class="info ird"><div class="il">Common pitfall: model mismatch</div>
If you embed the corpus with <code>bge-base</code> but the query with <code>all-MiniLM</code>, the vectors live in <strong>different spaces</strong> and cosine similarity becomes meaningless. Always use the same model on both sides. If you ever swap embedding models, you must <strong>re-embed the entire corpus</strong>.</div>`;

  h += `<div class="info ig"><div class="il">Variant: HyDE (Hypothetical Document Embeddings)</div>
Instead of embedding the raw query, HyDE [6] first asks an LLM to <em>write a plausible answer</em> to the query, then embeds the <em>answer</em> and searches with that embedding. The intuition: a fake answer is closer in vector space to real answers than the question itself is. This often improves retrieval quality, especially for underspecified queries.</div>`;

  return h;
}},

// ───────────────────── 7. SIMILARITY ─────────────────────
{id: 'similarity', title: 'Similarity Search', group: 'Retrieval',
render() {
  const {query, scored} = computeRetrieval();
  let h = `<div class="stage-title">Step 5 · Cosine Similarity Search <span class="tag ts">SEARCH</span></div>`;
  h += `<p class="stage-desc">Compute the cosine similarity between the query embedding and <strong>every chunk embedding</strong> in the database. Since all vectors are L2-normalized, cosine similarity reduces to a simple dot product — fast and parallelizable.</p>`;

  h += `<div class="formula">sim(q, d) = <span class="purple">q_vec</span> · <span class="rust">d_vec</span> = Σᵢ <span class="purple">q_vec[i]</span> · <span class="rust">d_vec[i]</span>&nbsp;&nbsp;&nbsp;<span class="cm">// dot product (both unit length)</span></div>`;

  // Show a sample computation for the top-1 result
  const top = scored[0];
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">Worked example · comparing the query to ${top.id}</h3>`;
  h += `<div class="mtx-wrap"><div class="mtx-row">`;
  h += renderVec(query.vec, 'q_vec', 'cp');
  h += `<span class="op">·</span>`;
  h += renderVec(top.vec, `${top.id} vec`, 'cr');
  h += `<span class="op">=</span>`;
  h += `<div class="mtx-block"><div class="mtx-label">sim</div><table class="mtx"><tr><td class="ca" style="font-size:0.85rem;font-weight:700;">${fmt(top.score)}</td></tr></table></div>`;
  h += `</div></div>`;

  // Show all scores as bars
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">Scores for all ${CORPUS.length} chunks (sorted)</h3>`;
  h += `<p class="stage-desc">Each bar shows the cosine similarity between the query and one chunk. Higher = more relevant. The top few should come from the correct topic cluster.</p>`;
  const maxScore = Math.max(...scored.map(s => s.score));
  h += `<div class="bar-wrap">`;
  scored.forEach((s, i) => {
    const isTop = i < TOP_K;
    const width = Math.max(2, (s.score / Math.max(maxScore, 0.01)) * 100);
    h += `<div class="bar-row">
<span class="bar-label">${s.id}</span>
<div class="bar-track"><div class="bar-fill" style="width:${width}%;background:${isTop ? 'var(--acc)' : 'var(--stone)'};opacity:${isTop ? 1 : 0.4};"></div></div>
<span class="bar-val" style="color:${isTop ? 'var(--acc)' : 'var(--txt3)'};">${fmt(s.score)}</span>
</div>`;
  });
  h += `</div>`;

  h += `<div class="info iac"><div class="il">Observation</div>
The top-${TOP_K} results (highlighted in forest green) should be from the ${query.topic} cluster. The other chunks — from unrelated topics — have clearly lower scores. This is the retrieval signal: even without keyword matching, semantic embeddings pull the right documents to the top.</div>`;

  // ── Interactive 2D plot with similarity lines ──
  h += `<h3 style="margin-top:1.5rem;font-size:0.95rem;color:var(--txt);">📊 Geometric view of similarity search</h3>`;
  h += `<p class="stage-desc">In 2D, cosine similarity is easy to see: <strong>closer points have higher scores</strong>. Each line in the plot below connects the query (purple star) to one document. <strong>Solid forest-green lines</strong> mark the top-${TOP_K} retrieved documents; <strong>dashed gray lines</strong> are everything else. The line thickness is proportional to the similarity score. Change the <strong>query</strong> and <strong>top-k</strong> controls in the header to see the lines re-route live.</p>`;
  h += `<div class="scatter-wrap">${renderScatter2D({showSimLines: true, showLabels: true, showRanks: true})}</div>`;
  h += `<div class="scatter-caption">↑ Query-to-document similarity lines · the top-${TOP_K} are highlighted with numbered ranks · change query and top-k in the header</div>`;

  h += `<div class="info ip"><div class="il">Note on dimensionality</div>
In this toy visualization, we project the 8-dim embeddings down to 2 using a hand-picked semantic projection. In a real system, embeddings might have 768 or 1536 or 3072 dimensions, and you'd use <strong>PCA</strong>, <strong>t-SNE</strong>, or <strong>UMAP</strong> for the reduction. The important property is preserved either way: clusters that are close in high-dim space stay close in 2D.</div>`;

  return h;
}},

// ───────────────────── 8. TOP-K ─────────────────────
{id: 'topk', title: 'Top-k Selection', group: 'Retrieval',
render() {
  const {retrieved} = computeRetrieval();
  let h = `<div class="stage-title">Step 6 · Top-k Selection <span class="tag tr">RETRIEVE</span></div>`;
  h += `<p class="stage-desc">Keep only the <strong>k chunks with the highest similarity scores</strong>. These will be fed to the LLM as context. Everything else is discarded (for this query — the database stays intact).</p>`;

  h += `<div class="formula">retrieved = argtop-k<sub>d ∈ corpus</sub> sim(q, d)&nbsp;&nbsp;&nbsp;<span class="cm">// currently k = ${TOP_K}</span></div>`;

  h += `<h3 style="margin-top:1rem;font-size:0.95rem;color:var(--txt);">Retrieved passages (k = ${TOP_K})</h3>`;
  h += `<p class="stage-desc">These are the passages that will be passed to the LLM. Change the top-k slider in the header to see more or fewer.</p>`;
  h += `<div class="doc-list">`;
  retrieved.forEach((d, i) => {
    h += renderDoc(d, {retrieved: true, top: i === 0, score: d.score, rank: i});
  });
  h += `</div>`;

  h += `<div class="info ig"><div class="il">How to pick k</div>
<strong>Small k (1–3):</strong> minimizes prompt cost and reduces the chance of distracting the LLM with irrelevant chunks. Works when retrieval is very precise.<br>
<strong>Medium k (5–10):</strong> standard default. Balances recall (catching the right chunk) with signal-to-noise.<br>
<strong>Large k (20+):</strong> for tasks needing broad coverage (summarization, multi-hop QA). Usually combined with a <em>re-ranker</em> that further filters the top-k down.</div>`;

  h += `<div class="info is"><div class="il">Advanced: re-ranking</div>
For higher-quality systems, the retrieval is a two-stage process:<br>
<strong>Stage 1:</strong> retrieve top-50 or top-100 with a cheap bi-encoder (what we just did).<br>
<strong>Stage 2:</strong> re-score those with a slow but accurate <strong>cross-encoder</strong> that reads the query and each chunk together and outputs a relevance score. Keep the top-5 after re-ranking.<br><br>
Cross-encoders (e.g., <code>ms-marco-MiniLM-L-12-v2</code>) are much more accurate than bi-encoders but can't be pre-computed — they must run per query per candidate, which is why they're only used on the shortlist.</div>`;

  return h;
}},

// ───────────────────── 8b. RE-RANKING ─────────────────────
{id: 'rerank', title: 'Re-ranking', group: 'Retrieval',
render() {
  const {query, scored} = computeRetrieval();
  let h = `<div class="stage-title">Deep Dive · Bi-encoder vs Cross-encoder Re-ranking <span class="tag tr">DEEP DIVE</span></div>`;
  h += `<p class="stage-desc">The retrieval you just saw uses a <strong>bi-encoder</strong> — cheap, pre-computable, but coarse. High-quality RAG systems add a second stage: a <strong>cross-encoder re-ranker</strong> that scores the shortlist more carefully. Understanding the difference between these two architectures is the single most important concept in modern dense retrieval.</p>`;

  // Side-by-side architecture comparison
  h += `<div class="encoder-cmp">
<div class="encoder-card bi">
<h4>Bi-encoder (a.k.a. dual encoder)</h4>
<div class="tagline">"Encode once, compare cheaply"</div>
<svg viewBox="0 0 300 170" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, sans-serif">
  <defs>
    <marker id="arrBi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b8778"/>
    </marker>
  </defs>
  <!-- Query path -->
  <rect x="10" y="10" width="80" height="22" rx="4" fill="#7e22ce28" stroke="#7e22ce" stroke-width="1.5"/>
  <text x="50" y="25" text-anchor="middle" font-size="10" fill="#7e22ce" font-weight="600">query</text>
  <line x1="50" y1="32" x2="50" y2="45" stroke="#8b8778" stroke-width="1.5" marker-end="url(#arrBi)"/>
  <rect x="10" y="48" width="80" height="30" rx="4" fill="#16653428" stroke="#166534" stroke-width="1.5"/>
  <text x="50" y="67" text-anchor="middle" font-size="10" fill="#166534" font-weight="700">Encoder</text>
  <line x1="50" y1="78" x2="50" y2="95" stroke="#8b8778" stroke-width="1.5" marker-end="url(#arrBi)"/>
  <rect x="10" y="98" width="80" height="22" rx="4" fill="#7e22ce28" stroke="#7e22ce" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="50" y="113" text-anchor="middle" font-size="9" fill="#7e22ce" font-family="DM Mono, monospace">q_vec</text>
  <!-- Document path -->
  <rect x="210" y="10" width="80" height="22" rx="4" fill="#c2410c28" stroke="#c2410c" stroke-width="1.5"/>
  <text x="250" y="25" text-anchor="middle" font-size="10" fill="#c2410c" font-weight="600">doc</text>
  <line x1="250" y1="32" x2="250" y2="45" stroke="#8b8778" stroke-width="1.5" marker-end="url(#arrBi)"/>
  <rect x="210" y="48" width="80" height="30" rx="4" fill="#16653428" stroke="#166534" stroke-width="1.5"/>
  <text x="250" y="67" text-anchor="middle" font-size="10" fill="#166534" font-weight="700">Encoder</text>
  <line x1="250" y1="78" x2="250" y2="95" stroke="#8b8778" stroke-width="1.5" marker-end="url(#arrBi)"/>
  <rect x="210" y="98" width="80" height="22" rx="4" fill="#c2410c28" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="250" y="113" text-anchor="middle" font-size="9" fill="#c2410c" font-family="DM Mono, monospace">d_vec</text>
  <!-- Combine -->
  <line x1="90" y1="109" x2="135" y2="143" stroke="#8b8778" stroke-width="1.5" marker-end="url(#arrBi)"/>
  <line x1="210" y1="109" x2="165" y2="143" stroke="#8b8778" stroke-width="1.5" marker-end="url(#arrBi)"/>
  <rect x="110" y="145" width="80" height="22" rx="4" fill="#0369a128" stroke="#0369a1" stroke-width="1.5"/>
  <text x="150" y="160" text-anchor="middle" font-size="9" fill="#0369a1" font-weight="600">cos(q, d)</text>
</svg>
<div class="props">
<strong>Two independent forward passes</strong> — one for the query, one for the document. The two vectors never interact inside the model; they only meet at the end for a fast dot product.<br><br>
<strong>✓ Documents can be pre-computed</strong> and stored offline. At query time: one encoder call + fast vector search.<br>
<strong>✓ Scales to billions</strong> of documents with HNSW indexing.<br>
<strong>✗ The encoder must be generic</strong> — it has to compress everything it <em>might</em> care about into a fixed-length vector, without knowing the query.<br><br>
<strong>Examples:</strong> Sentence-BERT, all-MiniLM, BGE, OpenAI embeddings, DPR.
</div>
</div>

<div class="encoder-card cross">
<h4>Cross-encoder (a.k.a. joint encoder)</h4>
<div class="tagline">"Read query and doc together"</div>
<svg viewBox="0 0 300 170" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, sans-serif">
  <defs>
    <marker id="arrCr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b8778"/>
    </marker>
  </defs>
  <!-- Single combined input -->
  <rect x="30" y="10" width="110" height="22" rx="4" fill="#7e22ce28" stroke="#7e22ce" stroke-width="1.5"/>
  <text x="85" y="25" text-anchor="middle" font-size="10" fill="#7e22ce" font-weight="600">[CLS] query</text>
  <rect x="160" y="10" width="110" height="22" rx="4" fill="#c2410c28" stroke="#c2410c" stroke-width="1.5"/>
  <text x="215" y="25" text-anchor="middle" font-size="10" fill="#c2410c" font-weight="600">[SEP] doc [SEP]</text>
  <!-- Merge arrow -->
  <line x1="85" y1="32" x2="150" y2="48" stroke="#8b8778" stroke-width="1.5"/>
  <line x1="215" y1="32" x2="150" y2="48" stroke="#8b8778" stroke-width="1.5"/>
  <line x1="150" y1="48" x2="150" y2="55" stroke="#8b8778" stroke-width="1.5" marker-end="url(#arrCr)"/>
  <!-- Single big encoder -->
  <rect x="30" y="58" width="240" height="60" rx="6" fill="#c2410c28" stroke="#c2410c" stroke-width="2"/>
  <text x="150" y="80" text-anchor="middle" font-size="11" fill="#c2410c" font-weight="700">Single Transformer</text>
  <text x="150" y="96" text-anchor="middle" font-size="9" fill="#57534e" font-style="italic">self-attention over query + doc jointly</text>
  <text x="150" y="110" text-anchor="middle" font-size="9" fill="#57534e">(every query token sees every doc token)</text>
  <line x1="150" y1="118" x2="150" y2="140" stroke="#8b8778" stroke-width="1.5" marker-end="url(#arrCr)"/>
  <!-- Score directly -->
  <rect x="100" y="142" width="100" height="22" rx="4" fill="#0369a128" stroke="#0369a1" stroke-width="1.5"/>
  <text x="150" y="157" text-anchor="middle" font-size="10" fill="#0369a1" font-weight="700">relevance score</text>
</svg>
<div class="props">
<strong>One forward pass per (query, doc) pair.</strong> The query and document are concatenated as a single input; self-attention lets them interact at every layer.<br><br>
<strong>✓ Much more accurate</strong> — the model can form query-specific representations and catch subtle relational signals.<br>
<strong>✗ Nothing can be pre-computed.</strong> Every query means re-running the model on every candidate.<br>
<strong>✗ Scales only to hundreds</strong> of candidates per query — impractical as a first-stage retriever.<br><br>
<strong>Examples:</strong> ms-marco-MiniLM-L-12-v2, bge-reranker-large, Cohere rerank, Voyage rerank-2.
</div>
</div>
</div>`;

  // The two-stage pipeline explanation
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">The two-stage pipeline · fast filter + precise judge</h3>`;
  h += `<p class="stage-desc">Neither architecture alone is ideal. Production RAG systems combine them: the bi-encoder scans the entire corpus to produce a shortlist of ~50–100 candidates, then the cross-encoder re-scores those candidates precisely. You get bi-encoder speed <em>and</em> cross-encoder quality.</p>`;
  h += `<div class="formula">corpus (10M docs)&nbsp;→&nbsp;<span class="hl">bi-encoder top-100</span>&nbsp;→&nbsp;<span class="rust">cross-encoder top-5</span>&nbsp;→&nbsp;LLM context</div>`;

  // Latency comparison chart (scaling with corpus size)
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">📊 Latency at scale · why two stages are necessary</h3>`;
  h += `<p class="stage-desc">The bar chart below shows approximate query latency (in ms) for each approach, assuming a realistic mix of CPU vector index + GPU cross-encoder. Note the different time scales.</p>`;
  const scenarios = [
    {name: 'Corpus: 1k docs',   bi: 2,    crossFull: 100,   twoStage: 12},
    {name: 'Corpus: 100k docs', bi: 5,    crossFull: 10000, twoStage: 15},
    {name: 'Corpus: 10M docs',  bi: 12,   crossFull: 1000000, twoStage: 22},
  ];
  h += `<div class="latency-chart">`;
  scenarios.forEach(s => {
    h += `<div style="font-family:var(--mono);font-size:0.75rem;color:var(--txt);font-weight:600;margin:0.7rem 0 0.3rem;">${s.name}</div>`;
    // Scale bars relative to max of this scenario
    const maxLat = Math.max(s.bi, s.crossFull, s.twoStage);
    const fmtLat = ms => ms < 1000 ? `${ms} ms` : ms < 60000 ? `${(ms/1000).toFixed(1)} s` : `${(ms/60000).toFixed(1)} min`;
    h += `<div class="lat-row"><span class="lat-label">bi-encoder</span><div class="lat-bar"><div class="lat-fill" style="width:${(s.bi/maxLat)*100}%;background:var(--acc);"></div></div><span class="lat-val">${fmtLat(s.bi)}</span></div>`;
    h += `<div class="lat-row"><span class="lat-label">cross-encoder (naive)</span><div class="lat-bar"><div class="lat-fill" style="width:100%;background:var(--red);"></div></div><span class="lat-val">${fmtLat(s.crossFull)}</span></div>`;
    h += `<div class="lat-row"><span class="lat-label">two-stage</span><div class="lat-bar"><div class="lat-fill" style="width:${(s.twoStage/maxLat)*100}%;background:var(--rust);"></div></div><span class="lat-val">${fmtLat(s.twoStage)}</span></div>`;
  });
  h += `</div>`;

  h += `<div class="info ir"><div class="il">Notice the scaling</div>
At 10M documents, a naive cross-encoder would take <strong>~16 minutes per query</strong> — obviously unusable. The two-stage pipeline stays around <strong>~22 ms</strong> regardless of corpus size, because the cross-encoder only runs on a fixed shortlist of 100 candidates. This decoupling is the entire reason production systems use both architectures.</div>`;

  // Re-ranking before/after demo
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">Re-ranking in action · before vs after</h3>`;
  h += `<p class="stage-desc">Below is a simulated re-ranking of the top-5 results for the current query. The cross-encoder scores are hand-crafted to show how re-ranking can shuffle the order — a document that was rank 4 in bi-encoder scores can jump to rank 1 because the cross-encoder reads it more carefully.</p>`;

  // Take top-5 bi-encoder
  const top5 = scored.slice(0, 5);
  // Simulate cross-encoder re-ranking: permute with a deterministic "better" order
  // We boost docs whose text length matches query topic more precisely
  const crossScores = top5.map((d, i) => ({
    ...d,
    // Simulated cross-encoder: amplifies differences, injects some reshuffling
    crossScore: +(0.5 + 0.4 * Math.sin(d.score * 7 + i * 2.3) + d.score * 0.1).toFixed(3)
  }));
  const afterRerank = [...crossScores].sort((a, b) => b.crossScore - a.crossScore);

  h += `<div class="rerank-grid">
<div class="rerank-col before">
<h4>Before · bi-encoder top-5</h4>`;
  top5.forEach((d, i) => {
    h += `<div class="rerank-item"><span class="rank">${i + 1}</span><span class="id">${d.id}</span><span class="score">${fmt(d.score)}</span></div>`;
  });
  h += `</div>
<div class="rerank-arrow">→</div>
<div class="rerank-col after">
<h4>After · cross-encoder re-scored</h4>`;
  afterRerank.forEach((d, newRank) => {
    const oldRank = top5.findIndex(t => t.id === d.id);
    const moved = newRank < oldRank ? 'moved-up' : newRank > oldRank ? 'moved-down' : '';
    const arrow = newRank < oldRank ? '↑' : newRank > oldRank ? '↓' : '·';
    h += `<div class="rerank-item ${moved}"><span class="rank">${newRank + 1}</span><span class="id">${d.id}</span><span style="color:var(--txt3);font-family:var(--mono);font-size:0.66rem;">${arrow} was ${oldRank + 1}</span><span class="score">${fmt(d.crossScore)}</span></div>`;
  });
  h += `</div>
</div>`;

  h += `<div class="info iac"><div class="il">Why re-ranking matters in practice</div>
The bi-encoder has to decide "is this doc relevant?" without ever looking at the doc and query together. The cross-encoder can notice things like "the query asks about <em>causes</em> but this passage only lists <em>effects</em>" — a relational distinction that a single dot product cannot capture. Empirically, re-ranking typically improves NDCG@10 by <strong>5–15 percentage points</strong> over bi-encoder-only retrieval (Nogueira &amp; Cho 2019; Thakur et al. 2021).</div>`;

  h += `<div class="info ig"><div class="il">Library analogy</div>
<strong>Bi-encoder</strong> is like reading only the book titles on a shelf. You can scan thousands of books per minute, and you'll narrow a library down to 20 plausible candidates. But you'll sometimes miss a great book whose title doesn't match what you expected.<br><br>
<strong>Cross-encoder</strong> is like actually opening each book and skimming it with your specific question in mind. Much slower — a minute per book — but now you can tell which ones <em>really</em> answer the question.<br><br>
You wouldn't skim every book in the library, but skimming the 20 candidates the title-scan gave you? Perfectly manageable. That's retrieve-then-rerank in one sentence.</div>`;

  return h;
}},

// ───────────────────── 9. AUGMENT PROMPT ─────────────────────
{id: 'augment', title: 'Prompt Augmentation', group: 'Generation',
render() {
  const {query, retrieved} = computeRetrieval();
  let h = `<div class="stage-title">Step 7 · Augment the Prompt <span class="tag tst">AUGMENT</span></div>`;
  h += `<p class="stage-desc">Now we assemble the final prompt. The retrieved chunks are concatenated into a <strong>context block</strong>, wrapped with system instructions that tell the LLM to answer <em>only based on the provided context</em>, and the user's query is appended at the end.</p>`;

  h += `<div class="info ist"><div class="il">The prompt template</div>
Typically looks like:
<div class="formula" style="margin:0.6rem 0;">[SYSTEM]&nbsp;<span class="cm">rules for the model</span><br>[CONTEXT]&nbsp;<span class="cm">retrieved chunks, numbered</span><br>[QUERY]&nbsp;<span class="cm">user question</span><br>[ANSWER]&nbsp;<span class="cm">← LLM completes from here</span></div>
The exact wording varies but the structure is universal.</div>`;

  // Build the actual prompt
  h += `<h3 style="margin-top:1.2rem;font-size:0.95rem;color:var(--txt);">The augmented prompt (what actually gets sent to the LLM)</h3>`;
  let promptText = `<span class="label">System instructions</span><span class="sys">You are a helpful assistant. Answer the user's question using ONLY the provided context. If the answer is not in the context, say "I don't know." Cite sources by their doc_id.</span>

<span class="label">Retrieved context (top-${TOP_K})</span>`;
  retrieved.forEach((d, i) => {
    promptText += `\n<span class="ctx">[${d.id}] ${d.text}</span>`;
  });
  promptText += `\n\n<span class="label">User query</span><span class="q">${query.text}</span>

<span class="label">Answer</span><span class="a">___</span>`;
  h += `<div class="prompt-box">${promptText}</div>`;

  h += `<div class="info iac"><div class="il">Why the explicit instructions?</div>
Without the "use ONLY the provided context" clause, the LLM will happily blend its own memorized knowledge with the retrieved passages — defeating the grounding guarantee. Well-engineered RAG prompts are extremely firm about this: "if the answer is not in the context, say so." The stricter the instructions, the more auditable the system.</div>`;

  h += `<div class="info ig"><div class="il">Context window budget</div>
Every chunk in the context takes up tokens in the LLM's context window. For a 16k-token window:<br>
• System prompt: ~200 tokens<br>
• User query: ~50 tokens<br>
• Room for context: ~15 000 tokens<br>
• At 500 tokens/chunk, that's a hard ceiling of ~30 chunks per query.<br><br>
In practice you want <em>far fewer</em> — 3 to 10 well-chosen chunks beat 30 mediocre ones, because the LLM's attention dilutes as context grows ("lost in the middle" effect).</div>`;

  return h;
}},

// ───────────────────── 10. GENERATION ─────────────────────
{id: 'generation', title: 'Generation', group: 'Generation',
render() {
  const {query, retrieved} = computeRetrieval();
  let h = `<div class="stage-title">Step 8 · LLM Generation <span class="tag tac">GENERATE</span></div>`;
  h += `<p class="stage-desc">Finally, the augmented prompt is sent to a language model, which generates an answer conditioned on the retrieved context. Because the model sees specific factual passages, it can <strong>quote them, paraphrase them, and cite them</strong> — rather than pulling answers from its training memory.</p>`;

  h += `<div class="formula">answer = LLM( <span class="hl">augmented_prompt</span> )&nbsp;&nbsp;&nbsp;<span class="cm">// standard autoregressive generation</span></div>`;

  h += `<h3 style="margin-top:1rem;font-size:0.95rem;color:var(--txt);">With retrieval vs without retrieval</h3>`;
  h += `<p class="stage-desc">The same query, asked of the same LLM, with and without the retrieved context. Notice how RAG produces specific, grounded, citable answers, while the closed-book version either hedges or confabulates.</p>`;

  h += `<div class="answer-grid">
<div class="answer-card bad">
<div class="lbl">Without RAG · closed-book</div>
<div class="txt">${query.withoutRag}</div>
</div>
<div class="answer-card good">
<div class="lbl">With RAG · grounded</div>
<div class="txt">${query.withRag}</div>
</div>
</div>`;

  h += `<div class="info iac"><div class="il">What makes a good RAG answer</div>
<strong>1. Faithful</strong> — every claim traces back to a retrieved passage, nothing invented.<br>
<strong>2. Cited</strong> — each factual statement points to the chunk it came from.<br>
<strong>3. Complete</strong> — uses all the relevant retrieved information, not just the first chunk.<br>
<strong>4. Honest about gaps</strong> — if the context doesn't contain the answer, the model says so instead of filling in from memory.</div>`;

  h += `<div class="info ig"><div class="il">The LLM is frozen too</div>
Notice that in standard RAG, the LLM itself is never trained or fine-tuned. It's used as-is. All the "knowledge" lives in the vector database, and updating knowledge means updating the database — no retraining, no fine-tuning, no re-deployment of the model. This is RAG's biggest operational advantage: the model and the knowledge are decoupled.</div>`;

  // ── Temperature section ──
  h += `<h3 style="margin-top:1.5rem;font-size:0.95rem;color:var(--txt);">Where does temperature fit in?</h3>`;
  h += `<p class="stage-desc">At the very end of this step, when the LLM actually generates tokens, the standard sampling hyperparameters apply — <code>temperature</code>, <code>top-k</code>, <code>top-p</code>. They operate on the <strong>final softmax over the vocabulary</strong>, exactly as in any non-RAG LLM. The retrieval pipeline has no influence on them and they have no influence on the retrieval pipeline.</p>`;

  h += `<div class="info ip"><div class="il">Temperature recap (from the GPT decoder simulator)</div>
Temperature <code>T</code> divides the final logits before softmax:
<div class="formula" style="margin:0.6rem 0;">P(next token) = softmax( logits / <span class="hl">T</span> )</div>
<strong>T &lt; 1</strong> → sharper distribution, more deterministic output. Good for factual RAG answers where you want the model to commit to what the context says.<br>
<strong>T = 1</strong> → the model's natural distribution.<br>
<strong>T &gt; 1</strong> → flatter distribution, more creative/varied output. Rarely what you want in RAG — it can cause the model to wander away from the retrieved facts.</div>`;

  h += `<div class="info iac"><div class="il">Recommended temperature for RAG</div>
Most production RAG systems set <strong>temperature = 0 to 0.3</strong>, deliberately pushing the model toward deterministic, committed answers:<br><br>
<strong>Why low?</strong> You retrieved specific passages for a reason. You want the model to <em>use</em> those facts, not to improvise around them. High temperature makes the model more likely to paraphrase loosely, fill in gaps from memory, or pick a less-supported token — all of which weaken the grounding guarantee that RAG is supposed to provide.<br><br>
<strong>Exception:</strong> if the task is generative rather than factual (e.g., "write a marketing blurb using these product specs"), a moderate temperature (0.5–0.7) can help produce varied phrasings while the retrieved context still anchors the content.</div>`;

<tr><td class="sym" style="color:var(--acc);">similarity metric</td><td class="val">Retrieval</td><td>Usually cosine similarity. Could also be dot product or Euclidean distance.</td></tr>
<tr><td class="sym" style="color:var(--stone);">system prompt</td><td class="val">Prompting</td><td><strong>Instructions to the LLM</strong> about how to use the context ("answer only from context", "cite sources", etc.).</td></tr>

// ───────────────────── 11. FAILURE MODES ─────────────────────
{id: 'failures', title: 'Failure Modes', group: 'Deep Dive',
render() {
  let h = `<div class="stage-title">Failure Modes & How to Fix Them <span class="tag trd">PITFALLS</span></div>`;
  h += `<p class="stage-desc">RAG systems fail in predictable ways. Understanding these failure modes is key to building a reliable system.</p>`;

  h += `<div class="info ird"><div class="il">1 · Retrieval miss — the right chunk is never fetched</div>
<strong>Symptom:</strong> The correct passage exists in the corpus but doesn't make it into the top-k for a reasonable query.<br>
<strong>Causes:</strong> Poor embedding model, wrong chunk size, vocabulary mismatch between query and corpus, overly aggressive filtering.<br>
<strong>Fixes:</strong> Swap in a stronger embedding model, use <strong>hybrid search</strong> (combine dense + BM25 keyword search), apply <strong>query rewriting</strong> (have the LLM rephrase the query first), try HyDE [6].</div>`;

  h += `<div class="info ird"><div class="il">2 · "Lost in the middle"</div>
<strong>Symptom:</strong> The relevant chunk is retrieved and placed in the context, but the LLM ignores it and answers from memory anyway.<br>
<strong>Cause:</strong> Liu et al. (2023) showed that LLMs systematically under-attend to the middle of long contexts — the beginning and end dominate.<br>
<strong>Fixes:</strong> Keep context short (fewer, better chunks), put the most important chunk <em>first</em>, use a cross-encoder re-ranker so the top-1 is really the most relevant.</div>`;

  h += `<div class="info ird"><div class="il">3 · Context poisoning</div>
<strong>Symptom:</strong> The retriever returns a chunk that is topically related but <em>factually wrong</em> or <em>contradicts</em> other retrieved chunks. The LLM may pick the wrong one.<br>
<strong>Causes:</strong> Corpus contains outdated or conflicting sources; the similarity metric can't distinguish "correct" from "plausible."<br>
<strong>Fixes:</strong> Add metadata filters (freshness, authority), use re-ranking with quality signals, have the LLM explicitly reason about conflicts in the context.</div>`;

  h += `<div class="info ird"><div class="il">4 · Chunk fragmentation</div>
<strong>Symptom:</strong> A fact is split across two chunks — the chunk boundary cuts through the middle of a key sentence — so neither chunk alone contains the answer.<br>
<strong>Fix:</strong> Use overlapping chunks (10–20% overlap) so straddling facts appear in both. Or use structure-aware chunking.</div>`;

  h += `<div class="info ird"><div class="il">5 · Prompt leakage — model answers from its own memory anyway</div>
<strong>Symptom:</strong> The LLM confidently answers even when the retrieved context doesn't support the answer.<br>
<strong>Fix:</strong> Strict system prompts ("use ONLY the provided context"), and evaluation datasets that specifically test "I don't know" behavior. Models like Claude are generally good at this; some base models need heavy prompting.</div>`;

  h += `<div class="info iac"><div class="il">Evaluation matters</div>
RAG systems need different metrics than either pure retrieval or pure generation:<br>
• <strong>Retrieval metrics:</strong> recall@k, precision@k (did we get the right chunk?)<br>
• <strong>Faithfulness:</strong> does the answer match the retrieved context? (RAGAS, TruLens)<br>
• <strong>Answer relevance:</strong> does the answer actually address the question?<br>
• <strong>Context relevance:</strong> did we retrieve too much irrelevant stuff?<br><br>
Tools like <strong>RAGAS</strong>, <strong>TruLens</strong>, and <strong>DeepEval</strong> automate these evaluations.</div>`;

  return h;
}},

// ───────────────────── 12. VARIANTS ─────────────────────
{id: 'variants', title: 'Advanced Variants', group: 'Deep Dive',
render() {
  let h = `<div class="stage-title">Advanced RAG Variants <span class="tag tp">ADVANCED</span></div>`;
  h += `<p class="stage-desc">The basic "embed → retrieve → stuff → generate" pipeline is now called "naive RAG". Over the past few years the field has developed many refinements. Gao et al. 2024 [8] is a good survey.</p>`;

  h += `<div class="info ip"><div class="il">Query rewriting</div>
Before embedding, pass the user's raw query through an LLM that rewrites it into one or more better search queries. For example: "what did they say about the bug yesterday?" → "error log timestamp 2025-11-19 authentication failure". Handles conversational, underspecified, or ambiguous inputs.</div>`;

  h += `<div class="info ip"><div class="il">HyDE · Hypothetical Document Embeddings [6]</div>
Ask the LLM to write a fake answer to the query first, embed that fake answer, and retrieve against it. The fake answer lives closer in vector space to real answers than the question does — queries and answers often have different vocabularies.</div>`;

  h += `<div class="info ip"><div class="il">Hybrid search</div>
Combine dense (embedding-based) retrieval with sparse (BM25 keyword) retrieval. Dense search catches semantic matches; sparse search catches exact terms and rare proper nouns. Scores are fused (e.g., <strong>reciprocal rank fusion</strong>). This is the practical default for production systems.</div>`;

  h += `<div class="info ip"><div class="il">Re-ranking</div>
After retrieving top-100 cheaply, re-score them with a slow but accurate <strong>cross-encoder</strong> and keep top-5. Adds ~100ms of latency but dramatically improves the quality of what actually reaches the LLM.</div>`;

  h += `<div class="info ip"><div class="il">Multi-hop / agentic RAG</div>
For questions that need chained reasoning ("What is the capital of the country where Marie Curie was born?"), a single retrieval is not enough. An LLM agent issues multiple retrievals, reasons over intermediate results, and composes a final answer. Frameworks like <strong>LangGraph</strong>, <strong>DSPy</strong>, and <strong>LlamaIndex Agents</strong> implement this.</div>`;

  h += `<div class="info ip"><div class="il">GraphRAG</div>
Instead of (or alongside) a vector database, extract entities and relationships from the corpus into a knowledge graph. Retrieve by traversing the graph. Microsoft's GraphRAG paper showed strong results on global-summarization queries where vector search struggles.</div>`;

  h += `<div class="info ip"><div class="il">Self-RAG / Corrective RAG</div>
The LLM can emit special tokens telling the system to retrieve more, to discard the current retrieval, or to flag low-confidence answers. The retrieval becomes a learned decision rather than a fixed pipeline stage.</div>`;

  h += `<div class="info iac"><div class="il">Long-context LLMs vs RAG · complementary, not competitive</div>
A frequent question: "Now that LLMs have 1M-token context windows, do we still need RAG?" Yes. Long-context helps, but RAG still wins on:<br>
<strong>1. Cost</strong> — sending 1M tokens per query is ~1000× more expensive than retrieving and sending 10k.<br>
<strong>2. Latency</strong> — long-context forward passes are slow; retrieval + short context is faster.<br>
<strong>3. Freshness</strong> — the corpus can update independently of the model.<br>
<strong>4. Auditability</strong> — citing specific retrieved chunks is cleaner than "somewhere in the 1M tokens I fed you".<br>
<strong>5. Accuracy</strong> — even with long contexts, LLMs exhibit "lost in the middle". Focused context beats sprawling context.</div>`;

  return h;
}},

      opts: [
        {t: "Loses the beginning of the context", ok: false},
        {t: "Systematically under-attends to information placed in the middle of a long context, favoring the beginning and end", ok: true},
        {t: "Randomly deletes tokens from the middle", ok: false},
        {t: "Only works if the query is in the middle", ok: false},
      ],
      fb: "Liu et al. 2023 showed that LLMs have U-shaped attention to long contexts: they use the first few and last few chunks but often ignore what's in the middle. Keep contexts short and put the most important chunk first."
    },
    {
      q: "After training, how do you update a RAG system's knowledge with new information?",
      opts: [
        {t: "Re-train the LLM from scratch", ok: false},
        {t: "Fine-tune the LLM on the new data", ok: false},
        {t: "Add the new documents to the vector database — the LLM doesn't need to change", ok: true},
        {t: "RAG systems can't be updated", ok: false},
      ],
      fb: "This is RAG's biggest operational advantage: knowledge lives in the vector database, not the model weights. Updating knowledge means adding documents — no retraining, no fine-tuning, no redeployment of the LLM."
    },
  ];

  questions.forEach((q, i) => {
    h += `<div class="quiz-q">
<div class="qnum">Question ${i + 1}</div>
<div class="qtext">${q.q}</div>`;
    q.opts.forEach(o => {
      h += `<button class="quiz-opt" onclick="quizCheck(this, ${o.ok}, 'q${i}fb')">${o.t}</button>`;
    });
    h += `<div class="quiz-fb" id="q${i}fb">${q.fb}</div>`;
    h += `</div>`;
  });

  h += `<div class="info iac"><div class="il">Done!</div>You now understand the full RAG pipeline: from document chunking through embedding, indexing, query-time similarity search, top-k selection, prompt augmentation, and grounded generation — plus the common failure modes and advanced variants. The surveys [8] and the original RAG paper [1] are good next reads.</div>`;

  return h;
}},

];

// ═══════ APP STATE ═══════
let currentStep = 0;

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let h = '<div class="side-label">RAG walkthrough</div>';
  const groups = {};
  STEPS.forEach((s, i) => {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push(i);
  });
  Object.keys(groups).forEach((g, gi) => {
    h += `<div class="side-label" style="margin-top:0.4rem;">${g}</div>`;
    groups[g].forEach(si => {
      const s = STEPS[si];
      const cls = si === currentStep ? 'on' : si < currentStep ? 'done' : '';
      h += `<button class="step-btn ${cls}" onclick="goStep(${si})"><span class="step-num">${si < currentStep ? '✓' : si + 1}</span>${s.title}</button>`;
    });
    if (gi < Object.keys(groups).length - 1) h += `<div class="step-divider"></div>`;
  });
  sb.innerHTML = h;
}

function renderMain() {
  const el = document.getElementById('main-content');
  const s = STEPS[currentStep];
  const q = NORMALIZED_QUERIES[QUERY_IDX];
  let h = `<div class="config">`;
  h += `<div class="cfg-item">N=<span>${CORPUS.length}</span></div>`;
  h += `<div class="cfg-item">d=<span>${CORPUS[0].vec.length}</span></div>`;
  h += `<div class="cfg-item">k=<span>${TOP_K}</span></div>`;
  h += `<div class="cfg-item">query=<span>"${q.text}"</span></div>`;
  h += `<div class="cfg-item" style="margin-left:auto;">step <span>${currentStep+1}</span>/${STEPS.length}</div>`;
  h += `</div>`;
  h += s.render();
  h += `<div class="nav-row">`;
  h += `<button class="nav-btn nav-prev" onclick="goStep(${currentStep-1})" ${currentStep===0?'disabled':''}>← Previous</button>`;
  h += `<button class="nav-btn nav-next" onclick="goStep(${currentStep+1})" ${currentStep===STEPS.length-1?'disabled':''}>${currentStep===STEPS.length-1?'Complete':'Next →'}</button>`;
  h += `</div>`;
  el.innerHTML = h;
}

function goStep(n) {
  if (n < 0 || n >= STEPS.length) return;
  currentStep = n;
  renderSidebar();
  renderMain();
  document.getElementById('main-content').scrollTop = 0;
}

function onQueryChange() {
  QUERY_IDX = parseInt(document.getElementById('query-select').value);
  renderMain();
}

function onKChange() {
  TOP_K = parseInt(document.getElementById('k-slider').value);
  document.getElementById('k-val').textContent = TOP_K;
  renderMain();
}

function onChunkSizeChange(v) {
  CHUNK_SIZE = parseInt(v);
  // Ensure overlap is always strictly less than chunk size
  if (CHUNK_OVERLAP >= CHUNK_SIZE) CHUNK_OVERLAP = Math.max(0, CHUNK_SIZE - 5);
  renderMain();
}

function onChunkOverlapChange(v) {
  CHUNK_OVERLAP = parseInt(v);
  if (CHUNK_OVERLAP >= CHUNK_SIZE) CHUNK_OVERLAP = Math.max(0, CHUNK_SIZE - 5);
  renderMain();
}

function quizCheck(btn, ok, fbId) {
  const q = btn.parentElement;
  if (q.dataset.answered) return;
  q.dataset.answered = '1';
  if (ok) {
    btn.classList.add('right');
  } else {
    btn.classList.add('wrong');
    q.querySelectorAll('.quiz-opt').forEach(o => {
      const oc = o.getAttribute('onclick');
      if (oc && oc.includes('true')) o.classList.add('right');
    });
  }
  document.getElementById(fbId).classList.add('show');
}

// ═══════ INIT ═══════
renderSidebar();
renderMain();
</script>
</body>
</html>
