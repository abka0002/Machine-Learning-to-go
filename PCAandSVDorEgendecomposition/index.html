let svdImg={type:'smiley', N:64, M:null, U:null, sv:null, V:null};

function setSvdImage(type){
  svdImg.type=type;
  svdImg.M=makeSvdImage(type, svdImg.N);
  const svd=computeSVD(svdImg.M);
  svdImg.U=svd.U; svdImg.sv=svd.sv; svdImg.V=svd.V;
  // highlight preset button
  ['smiley','brain'].forEach(t=>{
    const el=document.getElementById('svd-img-btn-'+t);
    if(el) el.classList.toggle('active', t===type);
  });
  const origCanvas=document.getElementById('svd-img-orig');
  if(origCanvas) drawMatrixToCanvas(origCanvas, svdImg.M);
  // Update the "rank" label with the actual numerical rank
  const actualRank=svdImg.sv.filter(s=>s>1e-10).length;
  const rkLbl=document.getElementById('lbl-svd-full-rank');
  if(rkLbl) rkLbl.textContent=actualRank;
  // Cap slider at actual rank so reconstruction never exceeds original
  const rkSlider=document.getElementById('sl-svd-rank');
  if(rkSlider){
    rkSlider.max=actualRank;
    if(+rkSlider.value>actualRank) rkSlider.value=actualRank;
  }
  const nSigLbl=document.getElementById('lbl-svd-nσ');
  if(nSigLbl) nSigLbl.textContent=actualRank;
  updateSvdCompression();
}

function updateSvdCompression(){
  if(!svdImg.M) return;
  const k=+document.getElementById('sl-svd-rank').value;
  document.getElementById('sv-svd-rank').textContent=k;
  const lbl=document.getElementById('lbl-svd-k');
  if(lbl) lbl.textContent=k;
  const Mrec=reconstructSVD(svdImg.U, svdImg.sv, svdImg.V, k);
  drawMatrixToCanvas(document.getElementById('svd-img-recon'), Mrec);
  drawErrorToCanvas(document.getElementById('svd-img-err'), svdImg.M, Mrec, 5);
  drawSvdSVChart('svd-sv-chart', svdImg.sv, k);
  // Stats
  const N=svdImg.N;
  let sumAll=0, sumKept=0, frobErrSq=0;
  for(let i=0;i<svdImg.sv.length;i++){
    const s2=svdImg.sv[i]*svdImg.sv[i];
    sumAll+=s2;
    if(i<k) sumKept+=s2;
    if(i>=k) frobErrSq+=s2;
  }
  const energyPct=sumAll>0 ? (sumKept/sumAll*100) : 100;
  const origBytes=N*N;                    // m·n
  const compBytes=k*(N+N+1);              // k·(m+n+1)
  const ratio=(origBytes/compBytes).toFixed(2);
  const savingPct=((1-compBytes/origBytes)*100).toFixed(1);
  const rmse=Math.sqrt(frobErrSq/(N*N));
  document.getElementById('svd-img-stats').innerHTML=
    '<div style="font-family:var(--font-mono);font-size:12px;line-height:1.9;color:var(--text-secondary)">'+
    'Energy kept &nbsp; <strong style="color:var(--accent)">'+energyPct.toFixed(1)+'%</strong><br>'+
    'Storage &nbsp;·&nbsp; orig = '+origBytes+' · comp = '+compBytes+' &nbsp;→&nbsp; <strong>'+ratio+'×</strong> smaller ('+savingPct+'% saved)<br>'+
    '‖A − A<sub>k</sub>‖<sub>F</sub><sup>2</sup> = Σ<sub>i&gt;k</sub> σ<sub>i</sub>² = <strong>'+frobErrSq.toFixed(2)+'</strong> &nbsp; (RMSE per pixel = '+rmse.toFixed(3)+')'+
    '</div>';
}

// =====================================================================
// --- Geometric transformation visualization (5 panels, all 2D) --------
// A is 3×2.  Full SVD: A = U(3×3) · S(3×2) · V^T(2×2).
// All panels project onto (x₁, x₂).
// Panel 1: X (unit circle)
// Panel 2: A·X  (direct multiplication, first 2 rows of A)
// Panel 3: V^T·X  (rotation only, still a circle)
// Panel 4: S·V^T·X  (stretch into ellipse)
// Panel 5: U·S·V^T·X = A·X  (must match panel 2)
// Special tracked points: origin (0,0), e₁=(1,0), e₂=(0,1)
// =====================================================================

function svdFull3x2(a00,a01, a10,a11, a20,a21){
  // Full SVD:  A (3×2) = U (3×3) · S (3×2) · V^T (2×2)
  // Step 1: eigendecompose A^T A (2×2) → V, singular values
  const p = a00*a00 + a10*a10 + a20*a20;
  const q = a01*a01 + a11*a11 + a21*a21;
  const r = a00*a01 + a10*a11 + a20*a21;
  const tr = p + q, det2 = p*q - r*r;
  const disc = Math.sqrt(Math.max(0, tr*tr - 4*det2));
  const lam1 = (tr + disc) / 2, lam2 = (tr - disc) / 2;
  const sig1 = Math.sqrt(Math.max(0, lam1));
  const sig2 = Math.sqrt(Math.max(0, lam2));
  let v1x, v1y;
  if (Math.abs(r) > 1e-12){ v1x = lam1 - q; v1y = r; }
  else { if (p >= q){ v1x = 1; v1y = 0; } else { v1x = 0; v1y = 1; } }
  const nv = Math.hypot(v1x, v1y);
  if (nv < 1e-12){ v1x = 1; v1y = 0; } else { v1x /= nv; v1y /= nv; }
  const v2x = -v1y, v2y = v1x;
  // Step 2: first two columns of U via u_i = A v_i / σ_i
  function Av(vx, vy){ return [a00*vx+a01*vy, a10*vx+a11*vy, a20*vx+a21*vy]; }
  let u1 = [0,0,0], u2 = [0,0,0];
  if (sig1 > 1e-10){ const c = Av(v1x,v1y); u1 = c.map(x=>x/sig1); }
  else { u1 = [1,0,0]; }
  if (sig2 > 1e-10){ const c = Av(v2x,v2y); u2 = c.map(x=>x/sig2); }
  else {
    // u2 must be orthogonal to u1; pick from candidates
    const candidates = [[0,1,0],[0,0,1],[1,0,0]];
    for (const c of candidates){
      const dot = c[0]*u1[0]+c[1]*u1[1]+c[2]*u1[2];
      const t = [c[0]-dot*u1[0], c[1]-dot*u1[1], c[2]-dot*u1[2]];
      const n = Math.hypot(...t);
      if (n > 0.1){ u2 = t.map(x=>x/n); break; }
    }
  }
  // Step 3: u3 = u1 × u2 (cross product to complete the orthonormal basis)
  const u3 = [
    u1[1]*u2[2] - u1[2]*u2[1],
    u1[2]*u2[0] - u1[0]*u2[2],
    u1[0]*u2[1] - u1[1]*u2[0]
  ];
  // Full U (3×3): columns are u1, u2, u3
  const U = [
    [u1[0], u2[0], u3[0]],
    [u1[1], u2[1], u3[1]],
    [u1[2], u2[2], u3[2]]
  ];
  // S (3×2): diagonal with sig1, sig2; third row is zeros
  const SIG = [[sig1, 0], [0, sig2], [0, 0]];
  // V^T (2×2)
  const VT = [[v1x, v1y], [v2x, v2y]];
  // For the 2D visualization we still only need the first 2 rows of U (2×2 block)
  // because the (x₁,x₂) projection of U·S·V^T·x only depends on U's first 2 rows.
  // S's third row is zero, so U's third column doesn't contribute to A·x.
  const Uproj = [[U[0][0], U[0][1]], [U[1][0], U[1][1]]];
  return {
    A: [[a00,a01],[a10,a11],[a20,a21]],
    U, SIG, VT, Uproj,
    sig1, sig2,
    thV_deg: -Math.atan2(v1y, v1x) * 180/Math.PI,
  };
}

// Draw a single panel.
// transformFn(x,y) → [tx, ty] transforms a 2D point for this stage.
function drawSvdPanel(svgId, transformFn, maxR, opts){
  const svg = document.getElementById(svgId); if(!svg) return;
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const W = +svg.getAttribute('width'), H = +svg.getAttribute('height');
  const cx = W/2, cy = H/2;
  const margin = 18;
  const scale = (Math.min(W,H)/2 - margin) / Math.max(maxR, 0.3);
  const toPx = (x, y) => [cx + x*scale, cy - y*scale];
  const showLabels = opts && opts.showLabels;

  // Grid
  const gmax = Math.max(1, Math.ceil(maxR));
  for (let g = -gmax; g <= gmax; g++){
    const [x1,y1] = toPx(g,-gmax), [x2,y2] = toPx(g,gmax);
    const vl = document.createElementNS(ns,'line');
    vl.setAttribute('x1',x1); vl.setAttribute('y1',y1);
    vl.setAttribute('x2',x2); vl.setAttribute('y2',y2);
    vl.setAttribute('stroke', g===0?'var(--grid-axis)':'#e5f0e5');
    vl.setAttribute('stroke-width', g===0?1.2:0.6);
    svg.appendChild(vl);
    const [x3,y3] = toPx(-gmax,g), [x4,y4] = toPx(gmax,g);
    const hl = document.createElementNS(ns,'line');
    hl.setAttribute('x1',x3); hl.setAttribute('y1',y3);
    hl.setAttribute('x2',x4); hl.setAttribute('y2',y4);
    hl.setAttribute('stroke', g===0?'var(--grid-axis)':'#e5f0e5');
    hl.setAttribute('stroke-width', g===0?1.2:0.6);
    svg.appendChild(hl);
  }

  // Unit-circle curve after transform
  const path = document.createElementNS(ns,'path');
  let d = '';
  for (let t = 0; t <= 2*Math.PI + 0.02; t += 0.04){
    const [tx,ty] = transformFn(Math.cos(t), Math.sin(t));
    const [px,py] = toPx(tx,ty);
    d += (t===0?'M':'L') + px.toFixed(1) + ',' + py.toFixed(1) + ' ';
  }
  path.setAttribute('d', d);
  path.setAttribute('fill', 'rgba(15,107,48,0.10)');
  path.setAttribute('stroke', 'var(--accent)');
  path.setAttribute('stroke-width', 2);
  svg.appendChild(path);

  // Rainbow tracking points
  const NPTS = 16;
  for (let k = 0; k < NPTS; k++){
    const t = (k/NPTS)*2*Math.PI;
    const [tx,ty] = transformFn(Math.cos(t), Math.sin(t));
    const [px,py] = toPx(tx,ty);
    const hue = Math.round((k/NPTS)*360);
    const dot = document.createElementNS(ns,'circle');
    dot.setAttribute('cx',px); dot.setAttribute('cy',py); dot.setAttribute('r',2.2);
    dot.setAttribute('fill','hsl('+hue+',55%,55%)');
    dot.setAttribute('opacity','0.6');
    svg.appendChild(dot);
  }

  // Special tracked points: origin, e1=(1,0), e2=(0,1)
  // Smart label placement: avoid overlaps by computing all positions first,
  // then nudging colliding labels apart.
  const specials = [
    { x:0, y:0, col:'#2e7d32', label:'O',  idx:0 },
    { x:1, y:0, col:'#d32f2f', label:'e₁', idx:1 },
    { x:0, y:1, col:'#1565c0', label:'e₂', idx:2 },
  ];
  const fmt2 = v => { const s = v.toFixed(1); return s === '-0.0' ? '0.0' : s; };

  // Pre-compute transformed positions
  const tPts = specials.map(({x, y}) => {
    const [tx, ty] = transformFn(x, y);
    return { tx, ty, px: toPx(tx, ty) };
  });

  // --- Arrows from transformed origin to transformed e₁ and e₂ ---
  const [ox, oy] = tPts[0].px;   // transformed origin in px
  const arrowDefs = [
    { pt: tPts[1], col: '#d32f2f' },   // origin → e₁
    { pt: tPts[2], col: '#1565c0' },   // origin → e₂
  ];
  arrowDefs.forEach(({ pt, col }) => {
    const [ex, ey] = pt.px;
    const len = Math.hypot(ex - ox, ey - oy);
    if (len < 3) return;  // skip degenerate arrows (e.g. origin maps to origin)
    // Shaft
    const shaft = document.createElementNS(ns, 'line');
    shaft.setAttribute('x1', ox); shaft.setAttribute('y1', oy);
    shaft.setAttribute('x2', ex); shaft.setAttribute('y2', ey);
    shaft.setAttribute('stroke', col);
    shaft.setAttribute('stroke-width', 2.5);
    shaft.setAttribute('stroke-linecap', 'round');
    shaft.setAttribute('opacity', '0.85');
    svg.appendChild(shaft);
    // Arrowhead
    const ang = Math.atan2(ey - oy, ex - ox);
    const aL = Math.min(12, len * 0.3);  // head size, capped
    const a1x = ex - aL * Math.cos(ang - 0.38);
    const a1y = ey - aL * Math.sin(ang - 0.38);
    const a2x = ex - aL * Math.cos(ang + 0.38);
    const a2y = ey - aL * Math.sin(ang + 0.38);
    const head = document.createElementNS(ns, 'polygon');
    head.setAttribute('points', ex+','+ey+' '+a1x+','+a1y+' '+a2x+','+a2y);
    head.setAttribute('fill', col);
    head.setAttribute('opacity', '0.85');
    svg.appendChild(head);
  });

  // For each point, pick a label placement quadrant that avoids the curve
  // and other labels.  We try 8 candidate offsets and pick the one furthest
  // from other label anchors.
  const labelR = 16;   // px offset from dot centre
  const candidates = [
    [labelR, -labelR],  [labelR, 0],  [labelR, labelR],     // right
    [-labelR, -labelR], [-labelR, 0], [-labelR, labelR],    // left
    [0, -labelR-4],     [0, labelR+4],                       // top / bottom
  ];
  const chosenOffsets = tPts.map((pt, i) => {
    let best = candidates[0], bestDist = -1;
    candidates.forEach(([cdx, cdy]) => {
      const lx = pt.px[0] + cdx, ly = pt.px[1] + cdy;
      // Penalise going out of bounds
      if (lx < 8 || lx > W-8 || ly < 8 || ly > H-8) return;
      // Distance to other label positions (use their dot positions as proxy)
      let minDist = Infinity;
      tPts.forEach((other, j) => {
        if (i === j) return;
        const d = Math.hypot(lx - other.px[0], ly - other.px[1]);
        minDist = Math.min(minDist, d);
      });
      if (minDist > bestDist) { bestDist = minDist; best = [cdx, cdy]; }
    });
    return best;
  });

  specials.forEach(({x, y, col, label, idx}) => {
    const { tx, ty, px: [px, py] } = tPts[idx];
    // Dot with crisp outline
    const dot = document.createElementNS(ns,'circle');
    dot.setAttribute('cx', px); dot.setAttribute('cy', py);
    dot.setAttribute('r', 5.5); dot.setAttribute('fill', col);
    dot.setAttribute('stroke', '#fff'); dot.setAttribute('stroke-width', 2);
    svg.appendChild(dot);

    // Label with background pill for readability
    const [offX, offY] = chosenOffsets[idx];
    const lx = px + offX, ly = py + offY;
    const anchor = offX < 0 ? 'end' : (offX === 0 ? 'middle' : 'start');
    const coordStr = showLabels ? label + '(' + fmt2(tx) + ',' + fmt2(ty) + ')' : label;

    // Background rect (rendered as a slightly oversized rect behind text)
    const bg = document.createElementNS(ns,'rect');
    const textW = coordStr.length * 5.8 + 6;  // approximate width
    const textH = 14;
    const bgX = anchor === 'end' ? lx - textW : (anchor === 'middle' ? lx - textW/2 : lx - 3);
    bg.setAttribute('x', bgX);
    bg.setAttribute('y', ly - textH + 2);
    bg.setAttribute('width', textW);
    bg.setAttribute('height', textH + 2);
    bg.setAttribute('rx', 3);
    bg.setAttribute('fill', 'rgba(255,255,255,0.88)');
    bg.setAttribute('stroke', col);
    bg.setAttribute('stroke-width', 0.5);
    svg.appendChild(bg);

    const txt = document.createElementNS(ns,'text');
    txt.setAttribute('x', lx);
    txt.setAttribute('y', ly);
    txt.setAttribute('text-anchor', anchor);
    txt.setAttribute('font-family', 'var(--font-mono)');
    txt.setAttribute('font-size', '10');
    txt.setAttribute('font-weight', '700');
    txt.setAttribute('fill', col);
    txt.textContent = coordStr;
    svg.appendChild(txt);

    // Leader line from dot to label
    const leaderDist = Math.hypot(offX, offY);
    if (leaderDist > 12) {
      const line = document.createElementNS(ns,'line');
      // Start from dot edge, end at label bg edge
      const angle = Math.atan2(offY, offX);
      const sx = px + 6.5*Math.cos(angle), sy = py + 6.5*Math.sin(angle);
      const ex = px + (leaderDist - 4)*Math.cos(angle), ey = py + (leaderDist - 4)*Math.sin(angle);
      line.setAttribute('x1', sx); line.setAttribute('y1', sy);
      line.setAttribute('x2', ex); line.setAttribute('y2', ey);
      line.setAttribute('stroke', col);
      line.setAttribute('stroke-width', 1);
      line.setAttribute('stroke-dasharray', '2,2');
      line.setAttribute('opacity', '0.5');
      svg.appendChild(line);
    }
  });
}

// Render U (3×3) · S (3×2) · V^T (2×2) as matrices.
function renderSvdMatrixDisplay(svdRes){
  const el = document.getElementById('svd-matrix-display'); if(!el) return;
  const { U, SIG, VT } = svdRes;
  const fmt = v => { const s = v.toFixed(3); return s === '-0.000' ? '0.000' : s; };
  // Generic matrix renderer: rows × cols
  const matBox = (rows, cols, M, labelHtml, color) => {
    let cells = '';
    for (let i = 0; i < rows; i++)
      for (let j = 0; j < cols; j++)
        cells += '<span>'+fmt(M[i][j])+'</span>';
    const bsz = rows === 3 ? 64 : 46;
    return '<div style="text-align:center">' +
      '<div style="color:'+color+';font-weight:700;margin-bottom:4px;font-size:14px">'+labelHtml+'</div>' +
      '<div style="display:inline-flex;align-items:center;gap:2px">' +
        '<span style="font-size:'+bsz+'px;color:var(--text-muted);font-weight:200;line-height:1;margin-top:-3px">[</span>' +
        '<div style="display:grid;grid-template-columns:repeat('+cols+',56px);gap:2px 4px;text-align:center;color:'+color+';font-size:13px">'+cells+'</div>' +
        '<span style="font-size:'+bsz+'px;color:var(--text-muted);font-weight:200;line-height:1;margin-top:-3px">]</span>' +
      '</div></div>';
  };
  const dot = '<span style="font-size:22px;color:var(--text-muted);padding:0 2px;align-self:center">·</span>';
  el.innerHTML =
    matBox(3, 3, U,   'U <span style="font-size:11px;font-weight:400">(3×3)</span>',              'var(--pc1-color)') + dot +
    matBox(3, 2, SIG, 'S <span style="font-size:11px;font-weight:400">(3×2)</span>',              'var(--accent)')    + dot +
    matBox(2, 2, VT,  'V<sup>T</sup> <span style="font-size:11px;font-weight:400">(2×2)</span>', 'var(--pc2-color)');
}

// Render the tracked-points table showing each special point through all 5 stages.
function renderPointsTable(svdRes){
  const el = document.getElementById('svd-points-table'); if(!el) return;
  const { A, Uproj, VT, sig1, sig2 } = svdRes;
  const thV = svdRes.thV_deg * Math.PI/180;

  const applyVT = (x,y) => {
    const c=Math.cos(thV), s=Math.sin(thV);
    return [c*x - s*y, s*x + c*y];
  };
  const applySig = (x,y) => [sig1*x, sig2*y];
  const applyUproj = (x,y) => [Uproj[0][0]*x+Uproj[0][1]*y, Uproj[1][0]*x+Uproj[1][1]*y];
  const applyA2d = (x,y) => [A[0][0]*x+A[0][1]*y, A[1][0]*x+A[1][1]*y];

  const fmt = v => { const s = v.toFixed(2); return s==='-0.00'?'0.00':s; };
  const vec = (x,y) => '('+fmt(x)+', '+fmt(y)+')';

  const points = [
    {label:'O (origin)',  col:'#2e7d32', x:0, y:0},
    {label:'e₁ (1, 0)',   col:'#d32f2f', x:1, y:0},
    {label:'e₂ (0, 1)',   col:'#1565c0', x:0, y:1},
  ];
  let rows = '';
  points.forEach(({label, col, x, y}) => {
    const [vx,vy] = applyVT(x,y);
    const [svx,svy] = applySig(vx,vy);
    const [ux,uy] = applyUproj(svx,svy);
    const [ax,ay] = applyA2d(x,y);
    rows +=
      '<tr>' +
        '<td style="padding:5px 8px;color:'+col+';font-weight:700;white-space:nowrap">'+label+'</td>' +
        '<td style="padding:5px 8px">'+vec(x,y)+'</td>' +
        '<td style="padding:5px 8px">'+vec(ax,ay)+'</td>' +
        '<td style="padding:5px 8px">'+vec(vx,vy)+'</td>' +
        '<td style="padding:5px 8px">'+vec(svx,svy)+'</td>' +
        '<td style="padding:5px 8px;font-weight:700">'+vec(ux,uy)+'</td>' +
        '<td style="padding:5px 8px;color:var(--text-muted)">'+(Math.hypot(ux-ax,uy-ay)<1e-9?'✓ match':'✗')+'</td>' +
      '</tr>';
  });
  el.innerHTML =
    '<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:12px;width:100%">' +
      '<thead><tr style="color:var(--text-muted);border-bottom:2px solid var(--border)">' +
        '<th style="padding:6px 8px;text-align:left">Point</th>' +
        '<th style="padding:6px 8px;text-align:left">X</th>' +
        '<th style="padding:6px 8px;text-align:left">A·X</th>' +
        '<th style="padding:6px 8px;text-align:left">V<sup>T</sup>·X</th>' +
        '<th style="padding:6px 8px;text-align:left">S·V<sup>T</sup>·X</th>' +
        '<th style="padding:6px 8px;text-align:left">U·S·V<sup>T</sup>·X</th>' +

function updateSvdGeoViz(){
  const a00 = +document.getElementById('svd-a00').value;
  const a01 = +document.getElementById('svd-a01').value;
  const a10 = +document.getElementById('svd-a10').value;
  const a11 = +document.getElementById('svd-a11').value;
  const a20 = +document.getElementById('svd-a20').value;
  const a21 = +document.getElementById('svd-a21').value;
  const res = svdFull3x2(a00, a01, a10, a11, a20, a21);
  const { Uproj, VT, sig1, sig2 } = res;
  const thV = res.thV_deg * Math.PI/180;

  // Build transform functions for each panel
  const identity = (x,y) => [x, y];
  const fA = (x,y) => [a00*x+a01*y, a10*x+a11*y];        // A·X (first 2 rows)
  const fVT = (x,y) => {
    const c=Math.cos(thV), s=Math.sin(thV);
    return [c*x - s*y, s*x + c*y];
  };
  const fSVT = (x,y) => { const [vx,vy] = fVT(x,y); return [sig1*vx, sig2*vy]; };
  const fUSVT = (x,y) => {
    const [sx,sy] = fSVT(x,y);
    return [Uproj[0][0]*sx+Uproj[0][1]*sy, Uproj[1][0]*sx+Uproj[1][1]*sy];
  };

  // Per-panel maxR so each panel fills its space. Panels 2 & 5 share
  // the same scale so the viewer can directly compare AX vs USVTX.
  const sampleMax = (fn) => {
    let mx = 0;
    for (let t = 0; t < 2*Math.PI; t += 0.08){
      const [tx,ty] = fn(Math.cos(t), Math.sin(t));
      mx = Math.max(mx, Math.abs(tx), Math.abs(ty));
    }
    [[0,0],[1,0],[0,1]].forEach(([px,py])=>{
      const [tx,ty] = fn(px,py);
      mx = Math.max(mx, Math.abs(tx), Math.abs(ty));
    });
    return mx;
  };
  const pad = 1.18;
  const rCircle = Math.max(1.15, sampleMax(identity)) * pad;
  const rAX     = Math.max(1.15, sampleMax(fA))       * pad;
  const rSVT    = Math.max(1.15, sampleMax(fSVT))     * pad;

  // Draw all 5 panels — each with its own scale
  drawSvdPanel('svd-g1', identity, rCircle, {showLabels:true});  // X
  drawSvdPanel('svd-g2', fA,      rAX,     {showLabels:true});  // A·X
  drawSvdPanel('svd-g3', fVT,     rCircle, {showLabels:true});  // V^T·X
  drawSvdPanel('svd-g4', fSVT,    rSVT,    {showLabels:true});  // S·V^T·X
  drawSvdPanel('svd-g5', fUSVT,   rAX,     {showLabels:true});  // U·S·V^T·X = A·X

  renderSvdMatrixDisplay(res);
  renderPointsTable(res);
}

// Two-class data generator for explore tab
function seededData2Class(n,corr,seed=42){
  let s=seed;
  const sr=()=>{s=(s*16807)%2147483647;return s/2147483647;};
  const sn=()=>{const u=sr()||.001,v=sr();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  const half=Math.floor(n/2);
  const data=[], labels=[];
  // Slightly tighter class clouds + stronger opposite mean shifts
  // so the class split is clearer in both 2D and along PC1.
  const spread=0.82;
  const shiftX=1.05;
  const shiftY=0.70;
  // Class 1: shifted to lower-left
  for(let i=0;i<half;i++){
    const z1=sn()*spread, z2=sn()*spread;
    const x=z1-shiftX;
    data.push([x, corr*x + Math.sqrt(Math.max(0,1-corr*corr))*z2-shiftY]);
    labels.push(0);
  }
  // Class 2: shifted to upper-right
  for(let i=0;i<n-half;i++){
    const z1=sn()*spread, z2=sn()*spread;
    const x=z1+shiftX;
    data.push([x, corr*x + Math.sqrt(Math.max(0,1-corr*corr))*z2+shiftY]);
    labels.push(1);
  }
  return {data, labels};
}

function drawPcaTransformed(svg, data, labels, p, W, H){
  svg.innerHTML='';
  const padL=50, padR=20, padT=40, padB=60;
  const pw=W-padL-padR, ph=H-padT-padB;
  const colors=['#1976d2','#e65100'];

  // Compute PC1 scores
  const scores=data.map(d=>(d[0]-p.mx)*p.v1[0]+(d[1]-p.my)*p.v1[1]);
  const xMin=-5, xMax=5;
  const range=xMax-xMin;
  const sx=v=>padL+((v-xMin)/range)*pw;

  // Title
  const tt=el('text',{x:W/2,y:padT-14,'text-anchor':'middle',fill:getCS('--heading'),'font-size':'14','font-weight':'600','font-family':'var(--font-display)'},svg);
  tt.textContent='PCA → 1D (PC1 Scores)';

  // Background
  el('rect',{x:padL,y:padT,width:pw,height:ph,fill:getCS('--green-50'),rx:6},svg);

  // Histogram — overlapping bars for each class
  const hBins=28, hBw=range/hBins;
  const hist0=Array(hBins).fill(0), hist1=Array(hBins).fill(0);
  scores.forEach((s,i)=>{
    const b=Math.min(hBins-1,Math.max(0,Math.floor((s-xMin)/hBw)));
    if(labels[i]===0) hist0[b]++; else hist1[b]++;
  });
  const hmax=Math.max(1,...hist0,...hist1)*1.15;
  const barW=pw/hBins;
  const histH=ph*0.55; // top 55% for histogram
  const dotAreaTop=padT+histH+20; // below histogram

  // Y grid for histogram
  const yStep=Math.ceil(hmax/4);
  for(let v=0;v<=hmax;v+=yStep){
    const y=padT+histH*(1-v/hmax);
    el('line',{x1:padL-4,y1:y,x2:padL+pw,y2:y,stroke:getCS('--grid-color'),'stroke-width':'0.5'},svg);
    const t=el('text',{x:padL-8,y:y+4,'text-anchor':'end',fill:getCS('--text-muted'),'font-size':'9','font-family':'var(--font-mono)'},svg);
    t.textContent=Math.round(v);
  }

  // Draw class 1 bars
  for(let b=0;b<hBins;b++){
    if(hist0[b]>0){
      const bh=(hist0[b]/hmax)*histH;
      el('rect',{x:padL+b*barW+1,y:padT+histH-bh,width:barW/2-1,height:bh,fill:colors[0],opacity:'0.6',rx:2},svg);
    }
    if(hist1[b]>0){
      const bh=(hist1[b]/hmax)*histH;
      el('rect',{x:padL+b*barW+barW/2,y:padT+histH-bh,width:barW/2-1,height:bh,fill:colors[1],opacity:'0.6',rx:2},svg);
    }
  }

  // Dot strips — two rows, one per class, with jitter
  let s0=77, s1=99;
  const jsr0=()=>{s0=(s0*16807)%2147483647;return s0/2147483647;};
  const jsr1=()=>{s1=(s1*16807)%2147483647;return s1/2147483647;};
  const dotRow0=dotAreaTop+15;
  const dotRow1=dotAreaTop+50;

  // Class labels for dot rows
  const cl0=el('text',{x:padL-8,y:dotRow0+4,'text-anchor':'end',fill:colors[0],'font-size':'10','font-weight':'600','font-family':'var(--font-mono)'},svg);
  cl0.textContent='C1';
  const cl1=el('text',{x:padL-8,y:dotRow1+4,'text-anchor':'end',fill:colors[1],'font-size':'10','font-weight':'600','font-family':'var(--font-mono)'},svg);
  cl1.textContent='C2';

  // Separator line between histogram and dots
  el('line',{x1:padL,y1:dotAreaTop-4,x2:padL+pw,y2:dotAreaTop-4,stroke:getCS('--border'),'stroke-width':'1','stroke-dasharray':'4,3'},svg);

  scores.forEach((sc,i)=>{
    const x=sx(sc);
    if(x<padL||x>padL+pw) return;
    if(labels[i]===0){
      const jy=(jsr0()-0.5)*16;
      el('circle',{cx:x,cy:dotRow0+jy,r:3.5,fill:colors[0],opacity:'0.5'},svg);
    } else {
      const jy=(jsr1()-0.5)*16;
      el('circle',{cx:x,cy:dotRow1+jy,r:3.5,fill:colors[1],opacity:'0.5'},svg);
    }
  });

  // Class means on PC1
  const mean0=scores.filter((_,i)=>labels[i]===0).reduce((a,b)=>a+b,0)/(scores.filter((_,i)=>labels[i]===0).length);
  const mean1=scores.filter((_,i)=>labels[i]===1).reduce((a,b)=>a+b,0)/(scores.filter((_,i)=>labels[i]===1).length);

  // Mean markers
  [mean0,mean1].forEach((m,ci)=>{
    const mx=sx(m);
    const my=ci===0?dotRow0:dotRow1;
    el('line',{x1:mx,y1:my-14,x2:mx,y2:my+14,stroke:colors[ci],'stroke-width':'2.5'},svg);
    const mt=el('text',{x:mx,y:my+(ci===0?-18:24),'text-anchor':'middle',fill:colors[ci],'font-size':'10','font-weight':'600','font-family':'var(--font-mono)'},svg);
    mt.textContent='μ='+m.toFixed(2);
  });

  // Separation arrow between means
  const arrowY=dotAreaTop+32;
  if(Math.abs(sx(mean1)-sx(mean0))>30){
    const x0=sx(Math.min(mean0,mean1))+8, x1=sx(Math.max(mean0,mean1))-8;
    el('line',{x1:x0,y1:arrowY,x2:x1,y2:arrowY,stroke:'#555','stroke-width':'1.5','marker-end':'none'},svg);
    el('line',{x1:x0,y1:arrowY-4,x2:x0,y2:arrowY+4,stroke:'#555','stroke-width':'1.5'},svg);
    el('line',{x1:x1,y1:arrowY-4,x2:x1,y2:arrowY+4,stroke:'#555','stroke-width':'1.5'},svg);
    const sepTxt=el('text',{x:(sx(mean0)+sx(mean1))/2,y:arrowY-6,'text-anchor':'middle',fill:'#555','font-size':'10','font-weight':'600','font-family':'var(--font-mono)'},svg);
    sepTxt.textContent='Δ='+Math.abs(mean1-mean0).toFixed(2);
  }

  // X axis with ticks
  el('line',{x1:padL,y1:padT+histH,x2:padL+pw,y2:padT+histH,stroke:getCS('--grid-axis'),'stroke-width':'1'},svg);
  [-4,-3,-2,-1,0,1,2,3,4].forEach(v=>{
    const x=sx(v);
    if(x>=padL&&x<=padL+pw){
      el('line',{x1:x,y1:padT+histH,x2:x,y2:padT+histH+5,stroke:getCS('--grid-axis'),'stroke-width':'1'},svg);
      const t=el('text',{x,y:padT+histH+16,'text-anchor':'middle',fill:getCS('--text-muted'),'font-size':'10','font-family':'var(--font-mono)'},svg);
      t.textContent=v;
    }
  });
  // Zero line through histogram
  const xZero=sx(0);
  if(xZero>padL&&xZero<padL+pw){
    el('line',{x1:xZero,y1:padT,x2:xZero,y2:padT+histH,stroke:getCS('--grid-axis'),'stroke-width':'1',opacity:'0.4','stroke-dasharray':'3,3'},svg);
  }

  // X label
  const xl=el('text',{x:padL+pw/2,y:H-8,'text-anchor':'middle',fill:'#cc2222','font-size':'13','font-weight':'600','font-family':'var(--font-mono)'},svg);

function updateExplore(){
  const corr=+document.getElementById('sl-explore-corr').value;
  document.getElementById('sv-explore-corr').textContent=corr.toFixed(2);
  // Update preset button highlights
  document.querySelectorAll('.preset-btn[id^="exp-"]').forEach(b=>b.classList.remove('active'));
  if(Math.abs(corr-0.37)<0.02) document.getElementById('exp-p1').classList.add('active');
  else if(Math.abs(corr-0.62)<0.02) document.getElementById('exp-p2').classList.add('active');
  else if(Math.abs(corr-0.94)<0.02) document.getElementById('exp-p3').classList.add('active');

  const {data: rawData, labels} = seededData2Class(200, corr, 77);
  // Standardize data (z-score): each column gets zero mean and unit variance.
  // This makes the covariance matrix equal to the correlation matrix,
  // so the diagonal entries are exactly 1.0 and the off-diagonal is ρ.
  const xsR=rawData.map(d=>d[0]), ysR=rawData.map(d=>d[1]);
  const mxR=xsR.reduce((a,b)=>a+b,0)/xsR.length;
  const myR=ysR.reduce((a,b)=>a+b,0)/ysR.length;
  const sxR=Math.sqrt(xsR.reduce((a,b)=>a+(b-mxR)*(b-mxR),0)/(xsR.length-1));
  const syR=Math.sqrt(ysR.reduce((a,b)=>a+(b-myR)*(b-myR),0)/(ysR.length-1));
  const data=rawData.map(d=>[(d[0]-mxR)/sxR, (d[1]-myR)/syR]);
  const p=doPCA(data);

  // Left: standardized data with PC axes
  drawPlot2Class(document.getElementById('plot-explore'), data, labels, p, 420, 420);

  // Right: PCA-transformed data
  drawPcaTransformed(document.getElementById('plot-explore-pca'), data, labels, p, 420, 420);

  // Covariance matrix
  const matC=document.getElementById('explore-mat');
  matC.innerHTML='';
  const br1=document.createElement('span');br1.className='matrix-bracket';br1.textContent='[';matC.appendChild(br1);
  const cells=document.createElement('div');cells.className='matrix-cells';
  [[p.sxx,p.sxy],[p.sxy,p.syy]].forEach((row,i)=>{
    const r=document.createElement('div');r.className='matrix-row';
    row.forEach((v,j)=>{
      const c=document.createElement('span');
      c.className='matrix-cell '+(i===j?'cell-diag':'cell-off');
      c.textContent=v.toFixed(4);
      r.appendChild(c);
    });
    cells.appendChild(r);
  });
  matC.appendChild(cells);
  const br2=document.createElement('span');br2.className='matrix-bracket';br2.textContent=']';matC.appendChild(br2);

  // Stats
  const total=p.l1+p.l2;
  const pct1=(p.l1/total*100).toFixed(1);
  const pct2=(p.l2/total*100).toFixed(1);
  renderStats(document.getElementById('stats-explore'),[
    {val:p.l1.toFixed(4),label:'λ₁'},
    {val:p.l2.toFixed(4),label:'λ₂'},
    {val:pct1+'%',label:'Var. by λ₁'},
    {val:pct2+'%',label:'Var. by λ₂'},
  ]);

  // Variance bars
  renderVarBars(document.getElementById('bars-explore'),p.l1,p.l2);

  // Info panel
  const rho_actual = p.sxy / Math.sqrt(p.sxx * p.syy);
  document.getElementById('info-explore').innerHTML=`
    <div class="mono-line">ρ (actual) = ${rho_actual.toFixed(4)}</div>
    <div class="mono-line">eigenvalues = [${p.l1.toFixed(4)}, ${p.l2.toFixed(4)}]</div>
    <div class="mono-line">λ₁/(λ₁+λ₂) ≈ ${pct1}%</div>
    <div class="mono-line">λ₂/(λ₁+λ₂) ≈ ${pct2}%</div>`;

  // Insight callout
  let insight;
  const scores=data.map(d=>(d[0]-p.mx)*p.v1[0]+(d[1]-p.my)*p.v1[1]);
  const sep=Math.abs(
    scores.filter((_,i)=>labels[i]===1).reduce((a,b)=>a+b,0)/(scores.filter((_,i)=>labels[i]===1).length) -
    scores.filter((_,i)=>labels[i]===0).reduce((a,b)=>a+b,0)/(scores.filter((_,i)=>labels[i]===0).length)
  );
  if(corr>0.8){
    insight=`<strong>High correlation (ρ ≈ ${corr.toFixed(2)})</strong> — PC1 captures <strong>${pct1}%</strong> of total variance. After projecting onto PC1, the two classes are <strong>clearly separated</strong> (Δμ = ${sep.toFixed(2)}) with minimal overlap. A simple threshold on the PC1 score alone would classify most points correctly. This is the power of PCA with correlated features.`;
  } else if(corr>0.5){
    insight=`<strong>Medium correlation (ρ ≈ ${corr.toFixed(2)})</strong> — PC1 captures <strong>${pct1}%</strong> of variance. The 1D projection shows the classes are <strong>partially separable</strong> (Δμ = ${sep.toFixed(2)}) but with significant overlap in the histogram. Reducing to 1D loses some discriminative information that was spread across both original dimensions.`;
  } else {
    insight=`<strong>Low correlation (ρ ≈ ${corr.toFixed(2)})</strong> — Variance is <strong>spread across both PCs</strong> (λ₁ ≈ ${pct1}%, λ₂ ≈ ${pct2}%). The 1D projection shows <strong>heavy overlap</strong> between classes (Δμ = ${sep.toFixed(2)}) — the classes cannot be distinguished by PC1 alone. PCA dimensionality reduction would destroy the class structure here.`;
  }
  document.getElementById('explore-insight').innerHTML=insight;
}

function standardize2D(data){
  const n=data.length;
  const m1=data.reduce((a,d)=>a+d[0],0)/n;
  const m2=data.reduce((a,d)=>a+d[1],0)/n;
  const s1=Math.sqrt(data.reduce((a,d)=>a+(d[0]-m1)**2,0)/(n-1));
  const s2=Math.sqrt(data.reduce((a,d)=>a+(d[1]-m2)**2,0)/(n-1));
  return data.map(d=>[(d[0]-m1)/s1*1.5, (d[1]-m2)/s2*1.5]);
}

function drawResult1D(svg, scores, W, H){
  svg.innerHTML='';
  const pad=50, padR=30, padB=50, padT=40;
  const pw=W-pad-padR, ph=H-padT-padB;

  // Title
  const title=el('text',{x:W/2,y:22,'text-anchor':'middle',fill:getCS('--heading'),'font-size':'16','font-weight':'600','font-family':'var(--font-display)'},svg);
  title.textContent='Resulting 1D Projection (PC1)';

  // Background
  el('rect',{x:pad,y:padT,width:pw,height:ph,fill:getCS('--green-50'),rx:6},svg);

  // Histogram
  const bins=20;
  const xMin=-4, xMax=4, range=xMax-xMin;
  const bw=range/bins;
  const hist=Array(bins).fill(0);
  scores.forEach(v=>{const b=Math.floor((v-xMin)/bw);if(b>=0&&b<bins)hist[b]++;else if(b>=bins)hist[bins-1]++;});
  const hmax=Math.max(...hist)||1;
  const barW=pw/bins;

  hist.forEach((h,i)=>{
    if(h===0)return;
    const bh=(h/hmax)*ph*0.85;
    const intensity=0.45+0.5*(h/hmax);
    el('rect',{x:pad+i*barW+1,y:padT+ph-bh,width:barW-2,height:bh,fill:getCS('--proj-dot'),opacity:intensity,rx:2},svg);
  });

  // X axis ticks
  el('line',{x1:pad,y1:padT+ph,x2:pad+pw,y2:padT+ph,stroke:getCS('--grid-axis'),'stroke-width':'1'},svg);
  [-4,-3,-2,-1,0,1,2,3,4].forEach(v=>{
    const x=pad+((v-xMin)/range)*pw;
    if(x>=pad&&x<=pad+pw){
      el('line',{x1:x,y1:padT+ph,x2:x,y2:padT+ph+5,stroke:getCS('--grid-axis'),'stroke-width':'1'},svg);
      const t=el('text',{x,y:padT+ph+18,'text-anchor':'middle',fill:getCS('--text-muted'),'font-size':'11','font-family':'var(--font-mono)'},svg);
      t.textContent=v;
    }
  });
  // Zero line
  const xZero=pad+((0-xMin)/range)*pw;

  // Y grid
  [0,Math.round(hmax/2),hmax].forEach(v=>{

    t.textContent=v;
  });

  // Dot strip below histogram (show individual points)
  const stripY=padT+ph+32;
  scores.forEach(v=>{
    const x=pad+((v-xMin)/range)*pw;
    if(x>=pad&&x<=pad+pw){
      el('circle',{cx:x,cy:stripY,r:3,fill:getCS('--proj-dot'),opacity:'0.6'},svg);
    }
  });
  const sl=el('text',{x:W/2,y:stripY+18,'text-anchor':'middle',fill:getCS('--text-muted'),'font-size':'11','font-family':'var(--font-mono)'},svg);

  // Y label
  const yl=el('text',{x:14,y:padT+ph/2,'text-anchor':'middle',fill:getCS('--text-muted'),'font-size':'11','font-family':'var(--font-mono)',transform:`rotate(-90,14,${padT+ph/2})`},svg);
  yl.textContent='Count';
}

function drawResult2D(svg, scores2d, lambdas, W, H){
  svg.innerHTML='';
  const pad=56, padR=30, padT=40, padB=50;
  const pw=W-pad-padR, ph=H-padT-padB;

  // Title
  const title=el('text',{x:W/2,y:22,'text-anchor':'middle',fill:getCS('--heading'),'font-size':'16','font-weight':'600','font-family':'var(--font-display)'},svg);
  title.textContent='Transformed Data (2D)';

  // Background
  el('rect',{x:pad,y:padT,width:pw,height:ph,fill:getCS('--green-50'),rx:6},svg);

  // Compute axis range from data
  const pc1=scores2d.map(d=>d[0]), pc2=scores2d.map(d=>d[1]);
  const maxAbs=Math.max(3.5, Math.max(...pc1.map(Math.abs)), Math.max(...pc2.map(Math.abs)))*1.15;
  const sx=v=>pad+(v+maxAbs)/(2*maxAbs)*pw;
  const sy=v=>padT+(maxAbs-v)/(2*maxAbs)*ph;

  // Grid
  const step=maxAbs>4?2:1;
  for(let v=-Math.floor(maxAbs);v<=Math.floor(maxAbs);v+=step){
    const x=sx(v), y=sy(v);
    if(x>pad&&x<pad+pw) el('line',{x1:x,y1:padT,x2:x,y2:padT+ph,stroke:getCS('--grid-color'),'stroke-width':'0.5'},svg);
    if(y>padT&&y<padT+ph) el('line',{x1:pad,y1:y,x2:pad+pw,y2:y,stroke:getCS('--grid-color'),'stroke-width':'0.5'},svg);
  }

  // Axes through origin
  el('line',{x1:sx(-maxAbs),y1:sy(0),x2:sx(maxAbs),y2:sy(0),stroke:getCS('--grid-axis'),'stroke-width':'1',opacity:'0.5'},svg);
  el('line',{x1:sx(0),y1:sy(-maxAbs),x2:sx(0),y2:sy(maxAbs),stroke:getCS('--grid-axis'),'stroke-width':'1',opacity:'0.5'},svg);

  // Data points
  const tooltip=document.getElementById('tooltip');
  scores2d.forEach((d,i)=>{
    const c=el('circle',{cx:sx(d[0]),cy:sy(d[1]),r:5,fill:getCS('--proj-dot'),opacity:'0.7',stroke:'#fff','stroke-width':'1.5'},svg);
    c.addEventListener('mouseenter',e=>{c.setAttribute('r','8');c.setAttribute('opacity','1');tooltip.textContent=`PC1: ${d[0].toFixed(2)}, PC2: ${d[1].toFixed(2)}`;tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-10)+'px';tooltip.classList.add('show');});
    c.addEventListener('mousemove',e=>{tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-10)+'px';});
    c.addEventListener('mouseleave',()=>{c.setAttribute('r','5');c.setAttribute('opacity','0.7');tooltip.classList.remove('show');});
  });

  // Axis labels
  const xl=el('text',{x:pad+pw/2,y:H-8,'text-anchor':'middle',fill:getCS('--pc1-color'),'font-size':'14','font-weight':'600','font-family':'var(--font-mono)'},svg);
  xl.textContent=`PC1 (${(lambdas[0]/(lambdas[0]+lambdas[1]+lambdas[2])*100).toFixed(1)}% var.)`;
  const yl=el('text',{x:14,y:padT+ph/2,'text-anchor':'middle',fill:getCS('--pc2-color'),'font-size':'14','font-weight':'600','font-family':'var(--font-mono)',transform:`rotate(-90,14,${padT+ph/2})`},svg);
  yl.textContent=`PC2 (${(lambdas[1]/(lambdas[0]+lambdas[1]+lambdas[2])*100).toFixed(1)}% var.)`;

  // Tick labels
  for(let v=-Math.floor(maxAbs);v<=Math.floor(maxAbs);v+=step){
    if(v===0) continue;
    const x=sx(v);
    if(x>pad+5&&x<pad+pw-5){
      const t=el('text',{x,y:padT+ph+16,'text-anchor':'middle',fill:getCS('--text-muted'),'font-size':'10','font-family':'var(--font-mono)'},svg);
      t.textContent=v;
    }
    const y=sy(v);
    if(y>padT+5&&y<padT+ph-5){
      const t=el('text',{x:pad-8,y:y+4,'text-anchor':'end',fill:getCS('--text-muted'),'font-size':'10','font-family':'var(--font-mono)'},svg);
      t.textContent=v;
    }
  }
}

// ===== EXPLAINED VARIANCE =====
// Generalized Jacobi eigenvalue solver for m×m symmetric matrix
function eigenSymM(M){
  const m=M.length;
  let a=M.map(r=>[...r]);
  let v=Array.from({length:m},(_,i)=>Array.from({length:m},(__,j)=>i===j?1:0));
  for(let iter=0;iter<200;iter++){
    let maxVal=0,p=0,q=1;
    for(let i=0;i<m;i++)for(let j=i+1;j<m;j++){if(Math.abs(a[i][j])>maxVal){maxVal=Math.abs(a[i][j]);p=i;q=j;}}
    if(maxVal<1e-12)break;
    const theta=0.5*Math.atan2(2*a[p][q],a[p][p]-a[q][q]);
    const cs=Math.cos(theta),sn=Math.sin(theta);
    const nA=a.map(r=>[...r]);
    for(let i=0;i<m;i++){nA[i][p]=cs*a[i][p]+sn*a[i][q];nA[i][q]=-sn*a[i][p]+cs*a[i][q];}
    const nA2=nA.map(r=>[...r]);
    for(let j=0;j<m;j++){nA2[p][j]=cs*nA[p][j]+sn*nA[q][j];nA2[q][j]=-sn*nA[p][j]+cs*nA[q][j];}
    a=nA2;
    const nV=v.map(r=>[...r]);
    for(let i=0;i<m;i++){nV[i][p]=cs*v[i][p]+sn*v[i][q];nV[i][q]=-sn*v[i][p]+cs*v[i][q];}
    v=nV;
  }
  let eigs=[];
  for(let i=0;i<m;i++)eigs.push(Math.max(0,a[i][i]));
  eigs.sort((a,b)=>b-a);
  return eigs;
}

// Generate m-dim data with decaying correlations: corr(xi,xj) = rho^|i-j|
function generateMDimData(n,m,rho,seed=99){
  let s=seed;
  const sr=()=>{s=(s*16807)%2147483647;return s/2147483647;};
  const sn=()=>{const u=sr()||.001,v=sr();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  // Cholesky of Toeplitz correlation matrix corr(i,j)=rho^|i-j|
  // L[i][j] computed row by row
  const L=Array.from({length:m},()=>Array(m).fill(0));
  for(let i=0;i<m;i++){
    for(let j=0;j<=i;j++){
      let sum=0;
      for(let k=0;k<j;k++) sum+=L[i][k]*L[j][k];
      if(i===j) L[i][j]=Math.sqrt(Math.max(0.001,Math.pow(rho,0)-sum));
      else L[i][j]=(Math.pow(rho,Math.abs(i-j))-sum)/L[j][j];
    }
  }
  const data=[];
  for(let i=0;i<n;i++){
    const z=[];for(let j=0;j<m;j++)z.push(sn());
    const x=[];
    for(let j=0;j<m;j++){let v=0;for(let k=0;k<=j;k++)v+=L[j][k]*z[k];x.push(v);}
    data.push(x);
  }
  return data;
}

function computeExpVar(data){
  const n=data.length, m=data[0].length;
  const mu=Array(m).fill(0);
  for(let i=0;i<n;i++)for(let j=0;j<m;j++)mu[j]+=data[i][j]/n;
  // covariance matrix
  const S=Array.from({length:m},()=>Array(m).fill(0));
  for(let i=0;i<n;i++)for(let a=0;a<m;a++)for(let b=a;b<m;b++){
    const v=(data[i][a]-mu[a])*(data[i][b]-mu[b])/(n-1);
    S[a][b]+=v; if(a!==b) S[b][a]+=v;
  }
  const eigs=eigenSymM(S);
  const total=eigs.reduce((a,b)=>a+b,0);
  const ratios=eigs.map(e=>e/total*100);
  const cumulative=ratios.reduce((acc,v,i)=>{acc.push((acc[i-1]||0)+v);return acc;},[]);
  return {eigs, ratios, cumulative, total};
}

    el('rect',{x,y:padT+ph-bh,width:barW,height:bh,fill:pcCol[i%pcCol.length],opacity:'0.75',rx:4},svg);
    // label on bar
    if(r>2){
      const lt=el('text',{x:x+barW/2,y:padT+ph-bh-6,'text-anchor':'middle',fill:pcCol[i%pcCol.length],'font-size':'11','font-weight':'600','font-family':'var(--font-mono)'},svg);
      lt.textContent=r.toFixed(1)+'%';
    }
    // X label
    const xl=el('text',{x:x+barW/2,y:H-4,'text-anchor':'middle',fill:getCS('--text-muted'),'font-size':'10','font-family':'var(--font-mono)'},svg);
    xl.textContent='PC'+(i+1);
  });

  // Cumulative line (right axis: 0-100%)
  let pts=[];
  cumulative.forEach((c,i)=>{
    const x=pad+barGap+(barW+barGap)*i+barW/2;
    const y=padT+ph*(1-c/100);
    pts.push(`${x},${y}`);
  });
  el('polyline',{points:pts.join(' '),fill:'none',stroke:'#cc6644','stroke-width':'2.5','stroke-linejoin':'round','stroke-linecap':'round'},svg);
  // dots on cumulative
  cumulative.forEach((c,i)=>{
    const x=pad+barGap+(barW+barGap)*i+barW/2;
    const y=padT+ph*(1-c/100);
    el('circle',{cx:x,cy:y,r:4,fill:'#cc6644',stroke:'#fff','stroke-width':'2'},svg);
    // label
    if(i===0||i===m-1||c-cumulative[i-1]>3){
      const lt=el('text',{x,y:y-10,'text-anchor':'middle',fill:'#993333','font-size':'10','font-weight':'500','font-family':'var(--font-mono)'},svg);
      lt.textContent=c.toFixed(1)+'%';
    }
  });

  // Threshold lines: 90% and 95%
  [90,95].forEach(th=>{
    const y=padT+ph*(1-th/100);
    el('line',{x1:pad,y1:y,x2:pad+pw,y2:y,stroke:'#cc6644','stroke-width':'1','stroke-dasharray':'6,4',opacity:'0.5'},svg);
    const lt=el('text',{x:pad+4,y:y-4,fill:'#cc6644','font-size':'10','font-family':'var(--font-mono)',opacity:'0.7'},svg);
    lt.textContent=th+'% threshold';
  });

  // Legend
  const lx=pad+pw-155,ly=padT+6;
  el('rect',{x:lx,y:ly,width:152,height:42,rx:6,fill:'#fff',opacity:'0.92',stroke:getCS('--border'),'stroke-width':'1'},svg);
  el('rect',{x:lx+8,y:ly+10,width:16,height:10,rx:2,fill:getCS('--pc1-color'),opacity:'0.75'},svg);
  const tl1=el('text',{x:lx+30,y:ly+18,fill:getCS('--text'),'font-size':'10','font-family':'var(--font-mono)','font-weight':'500'},svg);
  tl1.textContent='Individual variance';
  el('line',{x1:lx+8,y1:ly+32,x2:lx+24,y2:ly+32,stroke:'#cc6644','stroke-width':'2.5'},svg);
  el('circle',{cx:lx+16,cy:ly+32,r:3,fill:'#cc6644'},svg);
  const tl2=el('text',{x:lx+30,y:ly+36,fill:getCS('--text'),'font-size':'10','font-family':'var(--font-mono)','font-weight':'500'},svg);
  tl2.textContent='Cumulative variance';
}

function updateExpVar(){
  const m=+document.getElementById('sl-ev-dim').value;
  const rho=+document.getElementById('sl-ev-corr').value;
  document.getElementById('sv-ev-dim').textContent=m;
  document.getElementById('sv-ev-corr').textContent=rho.toFixed(2);

  const data=generateMDimData(200,m,rho);
  const ev=computeExpVar(data);
  drawScreePlot(document.getElementById('plot-scree'),ev.ratios,ev.cumulative,540,340);

  // Variance bars
  const barCols=[getCS('--pc1-color'),getCS('--pc2-color'),getCS('--pc3-color'),'#5a9a7a','#7ab09a','#9ac5b0','#b5d6c4','#cce7d6'];
  document.getElementById('ev-bars').innerHTML=ev.ratios.map((r,i)=>{
    return `<div class="var-bar"><span class="var-bar-name" style="color:${barCols[i%barCols.length]};font-size:11px">PC${i+1}</span><div class="var-bar-track"><div class="var-bar-fill" style="width:${r.toFixed(1)}%;background:${barCols[i%barCols.length]}"></div><span class="var-bar-pct">${r.toFixed(1)}%</span></div></div>`;
  }).join('');

  // Threshold info
  let k90=ev.cumulative.findIndex(c=>c>=90)+1; if(k90===0) k90=m;
  let k95=ev.cumulative.findIndex(c=>c>=95)+1; if(k95===0) k95=m;
  let k99=ev.cumulative.findIndex(c=>c>=99)+1; if(k99===0) k99=m;
  document.getElementById('ev-thresholds').innerHTML=`
    <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="stat-block"><div class="stat-value">${k90} / ${m}</div><div class="stat-label">PCs for 90%</div></div>
      <div class="stat-block"><div class="stat-value">${k95} / ${m}</div><div class="stat-label">PCs for 95%</div></div>
      <div class="stat-block"><div class="stat-value">${k99} / ${m}</div><div class="stat-label">PCs for 99%</div></div>
    </div>`;

  // Info panel
  const pairs=[];
  for(let i=0;i<Math.min(m,4);i++)for(let j=i+1;j<Math.min(m,4);j++){
    pairs.push(`corr(x${i+1},x${j+1}) = ρ<sup>${Math.abs(i-j)}</sup> = ${Math.pow(rho,Math.abs(i-j)).toFixed(2)}`);
  }
  document.getElementById('ev-info').innerHTML=`
    <div class="mono-line">λ₁ = ${ev.eigs[0].toFixed(3)} → ${ev.ratios[0].toFixed(1)}% of total variance</div>
    <div class="mono-line">λ${m} = ${ev.eigs[m-1].toFixed(3)} → ${ev.ratios[m-1].toFixed(1)}% of total variance</div>
    <div class="note" style="margin-top:8px">
      <strong>Correlation structure</strong> (ρ = ${rho.toFixed(2)}):<br>
      ${pairs.slice(0,4).join(' · ')}<br><br>
      ${ev.ratios[0]>50
        ? `PC1 alone captures ${ev.ratios[0].toFixed(1)}% — the shared variation dominates. You could reduce from ${m}D to ${k95}D and keep ≥95% of the information.`
        : `Variance is spread across components — no single PC dominates. With weak correlations, dimensionality reduction saves fewer dimensions.`}<br><br>
      <strong>Rule of thumb:</strong> Keep enough components to explain 90–99% of variance, depending on your task's tolerance for information loss.
    </div>`;
}
document.getElementById('sl-ev-dim').addEventListener('input',updateExpVar);
document.getElementById('sl-ev-corr').addEventListener('input',updateExpVar);

function setProjPC(pc){
  projPC=pc;

function updateProject(){
  const corr=+document.getElementById('sl-proj-corr').value;
  const showL=document.getElementById('chk-proj').checked;
  document.getElementById('sv-proj-corr').textContent=corr.toFixed(2);
  const data=seededData(80,corr),p=doPCA(data);

  drawPlot(document.getElementById('plot-proj'),data,p,{showProj:showL,projPC:projPC});

  const scores=projPC===1?p.proj:p.proj2;
  const lam=projPC===1?p.l1:p.l2;
  const lamOther=projPC===1?p.l2:p.l1;
  const total=p.l1+p.l2;
  const ret=(lam/total*100);
  const lost=(lamOther/total*100);
  const std=Math.sqrt(scores.reduce((a,v)=>a+v*v,0)/(scores.length-1));

  drawHist(document.getElementById('plot-proj-hist'),scores,340,170,HIST_MIN,HIST_MAX);

  // Update labels
  const pcName=projPC===1?'PC1':'PC2';
  document.getElementById('proj-pc-label').textContent=pcName;
  document.getElementById('proj-vec-label').textContent=pcName;
  document.getElementById('proj-hist-title').textContent='Distribution on '+pcName+' (fixed axis [\u22126, +6])';

  renderStats(document.getElementById('proj-stats'),[
    {val:ret.toFixed(1)+'%',label:'Variance on '+pcName},
    {val:lost.toFixed(1)+'%',label:'Variance on '+(projPC===1?'PC2':'PC1')},
    {val:'\u03C3 = '+std.toFixed(2),label:'Spread of scores'},
    {val:lam.toFixed(3),label:'\u03BB'+(projPC===1?'\u2081':'\u2082')+' (eigenvalue)'},
    {val:lamOther.toFixed(3),label:'\u03BB'+(projPC===1?'\u2082':'\u2081')+' (eigenvalue)'},
    {val:data.length,label:'Points projected'},
  ]);
}
document.getElementById('sl-proj-corr').addEventListener('input',updateProject);
document.getElementById('chk-proj').addEventListener('change',updateProject);
